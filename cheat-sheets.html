<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Cheat Sheets | EngiPrep Hub</title>
    <meta name="description" content="One-page summary sheets for rapid revision. Important formulas, diagrams, and logic for JNTUK R23 exams.">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#f8fafc] text-slate-800 selection:bg-blue-100">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
            <a href="/" class="flex items-center gap-4 group">
                <div class="relative w-10 h-10 flex items-center justify-center">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl rotate-12 group-hover:rotate-0 transition-all duration-500 shadow-xl shadow-blue-500/20"></div>
                    <svg class="relative z-10 w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tighter text-slate-900 leading-none">EngiPrep <span class="text-blue-600">Hub</span></span>
                    <span class="text-[6px] font-black uppercase tracking-[0.2em] text-slate-400 mt-1">Prepare • Practice • Perform</span>
                </div>
            </a>
            <div id="nav-actions" class="flex items-center gap-4">
                <div class="skeleton w-32 h-10 opacity-20"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
         <!-- Advanced Back Navigation -->
        <div class="mb-4 animate-fade-up">
            <a href="javascript:history.length > 1 ? history.back() : window.location.href='/dashboard.html'" class="inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 hover:text-blue-600 transition-all group">
                <span class="w-8 h-8 rounded-xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800/50 flex items-center justify-center shadow-xs group-hover:-translate-x-1 transition-transform">
                    <svg class="w-4 h-4 text-slate-500 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                </span>
                Back to Dashboard
            </a>
        </div>

        <header class="mb-12 animate-fade-up">
            <div class="inline-block px-4 py-1.5 rounded-full bg-blue-50 border border-blue-100 text-blue-600 text-[10px] font-bold uppercase tracking-widest mb-6">Final Hour Lifelines</div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-4">Engineering <span class="text-blue-600">Cheat Sheets</span></h1>
            <p class="text-slate-500 max-w-2xl text-lg font-medium leading-relaxed">Compressed maps of complex curricula. Master whole units in 10 minutes or less with our visual summaries.</p>
        </header>

        <div id="sheets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading -->
            <div class="skeleton h-64 rounded-3xl opacity-50"></div>
            <div class="skeleton h-64 rounded-3xl opacity-30"></div>
            <div class="skeleton h-64 rounded-3xl opacity-10"></div>
        </div>
    </main>

    <script type="module">
        import { fetchNotesByType } from './src/notes.js'
        
        const grid = document.getElementById('sheets-grid')
        
        async function loadSheets() {
            try {
                const sheets = await fetchNotesByType('cheat-sheet')
                if (!sheets || sheets.length === 0) {
                   grid.innerHTML = '<div class="col-span-full py-32 text-center bg-white border border-slate-100 rounded-[2.5rem]"><span class="text-4xl mb-4 block">📏</span><h3 class="text-xl font-bold mb-2">No cheat sheets found</h3><p class="text-slate-400 text-sm">We are illustrating these visual summaries as we speak.</p></div>'
                   return
                }
                grid.innerHTML = sheets.map((s, idx) => `
                    <div class="bg-white border border-slate-100 rounded-[2.5rem] p-4 group hover:shadow-xl hover:shadow-blue-500/5 hover:-translate-y-1 transition-all">
                        <div class="aspect-[16/10] w-full bg-slate-50 rounded-[1.75rem] mb-6 relative overflow-hidden border border-slate-100">
                             <div class="absolute inset-0 flex items-center justify-center opacity-10 text-slate-300">
                                <span class="text-6xl font-black italic">GUIDE</span>
                             </div>
                             <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-lg text-[8px] font-black uppercase text-blue-600 shadow-sm">Formula Map</div>
                        </div>
                        <div class="px-4 pb-4">
                            <h3 class="text-xl font-extrabold text-slate-900 mb-2 truncate group-hover:text-blue-600 transition-colors">${s.title}</h3>
                            <p class="text-slate-500 text-xs font-medium mb-8 uppercase tracking-widest">${s.subject || 'All Engineering'}</p>
                            <div class="flex items-center justify-between pt-6 border-t border-slate-50">
                                <a href="/note-viewer.html?slug=${s.slug}" class="text-[10px] font-black uppercase tracking-widest text-blue-600">Download Sheet →</a>
                                <span class="text-[9px] text-slate-300 font-bold uppercase">1 Page PDF</span>
                            </div>
                        </div>
                    </div>
                `).join('')
            } catch (err) {
                grid.innerHTML = '<p class="text-center py-20 text-slate-400 font-bold">Error loading archives.</p>'
            }
        }
        
        loadSheets()
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
