<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previous Year Questions Catalog | EngiPrep Hub</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#f8fafc] text-slate-800">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
            <a href="/" class="flex items-center gap-4 group">
                <div class="relative w-10 h-10 flex items-center justify-center">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl rotate-12 group-hover:rotate-0 transition-all duration-500 shadow-xl shadow-blue-500/20"></div>
                    <svg class="relative z-10 w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tighter text-slate-900 leading-none">EngiPrep <span class="text-blue-600">Hub</span></span>
                    <span class="text-[6px] font-black uppercase tracking-[0.2em] text-slate-400 mt-1">Prepare • Practice • Perform</span>
                </div>
            </a>
            <div id="nav-actions" class="flex items-center gap-4">
                <div class="skeleton w-32 h-10 opacity-20"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        <!-- Advanced Back Navigation -->
        <div class="mb-4 animate-fade-up">
            <a href="javascript:history.length > 1 ? history.back() : window.location.href='/dashboard.html'" class="inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 hover:text-blue-600 transition-all group">
                <span class="w-8 h-8 rounded-xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800/50 flex items-center justify-center shadow-xs group-hover:-translate-x-1 transition-transform">
                    <svg class="w-4 h-4 text-slate-500 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                </span>
                Back to Dashboard
            </a>
        </div>

        <header class="mb-12 animate-fade-up">
            <div class="inline-block px-4 py-1.5 rounded-full bg-blue-50 border border-blue-100 text-blue-600 text-[10px] font-bold uppercase tracking-widest mb-6">Historical Archives</div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-4">Exam <span class="text-blue-600">PYQs Hub</span></h1>
            <p class="text-slate-500 max-w-2xl text-lg font-medium leading-relaxed">Master the exam patterns by solving previous year papers. Categorized for rapid access.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <!-- Sidebar Filters -->
            <aside class="space-y-8 animate-fade-up">
                <div class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Filter by Year</h3>
                    <div class="flex flex-col gap-2">
                        <button class="year-btn px-4 py-2 rounded-xl bg-blue-600 text-white text-[10px] font-bold uppercase tracking-widest transition-all" data-year="ALL">All Years</button>
                        <button class="year-btn px-4 py-2 rounded-xl bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-100 transition-all" data-year="2024">2024 Regular</button>
                        <button class="year-btn px-4 py-2 rounded-xl bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-100 transition-all" data-year="2023">2023 Regular</button>
                    </div>
                </div>
            </aside>

            <!-- Main PYQ Grid -->
            <div class="lg:col-span-3 space-y-6 animate-fade-up" style="animation-delay: 0.1s">
                <div id="pyq-list" class="grid grid-cols-1 gap-4">
                    <!-- Loading State -->
                    <div class="skeleton h-32 rounded-3xl opacity-50"></div>
                    <div class="skeleton h-32 rounded-3xl opacity-30"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { fetchNotesByType } from './src/notes.js'
        
        const list = document.getElementById('pyq-list')
        
        async function loadPYQs() {
            try {
                const pyqs = await fetchNotesByType('PYQ')
                if (!pyqs || pyqs.length === 0) {
                   list.innerHTML = '<div class="py-20 text-center text-slate-400 italic">No PYQs uploaded yet. Contribution system coming soon.</div>'
                   return
                }
                list.innerHTML = pyqs.map((q, idx) => `
                    <div class="bg-white border border-slate-100 rounded-3xl p-6 flex flex-col md:flex-row items-center justify-between gap-6 hover:shadow-xl hover:shadow-blue-500/5 hover:-translate-y-1 transition-all">
                        <div class="flex items-center gap-6">
                            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center font-black text-xl shrink-0">
                                ${q.subject ? q.subject.charAt(0) : 'E'}
                            </div>
                            <div>
                                <h3 class="text-xl font-extrabold text-slate-900 group-hover:text-blue-600">${q.title}</h3>
                                <div class="flex items-center gap-4 mt-2">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${q.subject || 'General'}</span>
                                    <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Weightage: ${q.weightage || 3}/5</span>
                                </div>
                            </div>
                        </div>
                        <a href="/note-viewer.html?slug=${q.slug}" class="btn-primary py-3 px-8 text-xs whitespace-nowrap">View Paper →</a>
                    </div>
                `).join('')
            } catch (err) {
                list.innerHTML = '<p class="text-center py-20 text-slate-400 font-bold">Error loading archives.</p>'
            }
        }
        
        loadPYQs()
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
