<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EngiPrep Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-50 font-sans selection:bg-blue-100 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-fade-up">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-500/20 text-white">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-900 dark:text-slate-50">Secure <span class="text-blue-600 dark:text-blue-400">Recovery</span></h1>
            <p class="text-slate-500 text-sm font-medium mt-2 dark:text-slate-400">Enter your new secure password below.</p>
        </div>

        <div class="bg-white dark:bg-slate-900 border border-slate-100 rounded-[2.5rem] p-10 shadow-sm">
            <form id="reset-form" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">New Password</label>
                    <input type="password" id="new-password" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white dark:bg-slate-900 transition-all" placeholder="••••••••" minlength="8">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Confirm Password</label>
                    <input type="password" id="confirm-password" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white dark:bg-slate-900 transition-all" placeholder="••••••••" minlength="8">
                </div>

                <button type="submit" id="submit-btn" class="btn-primary w-full py-4 mt-4">Update Password</button>
            </form>
            <div id="message" class="mt-8 p-4 rounded-2xl text-xs font-bold text-center hidden"></div>
        </div>
    </div>

    <script type="module">
        import { updatePassword } from './src/auth.js'
        import { supabase } from './src/supabase.js'

        const form = document.getElementById('reset-form')
        const messageDiv = document.getElementById('message')
        const submitBtn = document.getElementById('submit-btn')

        form.addEventListener('submit', async (e) => {
            e.preventDefault()
            const pass = document.getElementById('new-password').value
            const confirm = document.getElementById('confirm-password').value

            if (pass !== confirm) {
                showMessage('Passwords do not match.', 'error')
                return
            }

            submitBtn.disabled = true
            submitBtn.innerText = 'Updating...'

            try {
                await updatePassword(pass)
                showMessage('Password updated successfully! Redirecting...', 'success')
                setTimeout(() => window.location.href = '/auth.html', 2000)
            } catch (err) {
                showMessage(err.message, 'error')
                submitBtn.disabled = false
                submitBtn.innerText = 'Update Password'
            }
        })

        function showMessage(text, type) {
            messageDiv.innerText = text
            messageDiv.className = `mt-8 p-4 rounded-2xl text-xs font-bold text-center ${
                type === 'success' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'
            }`
            messageDiv.classList.remove('hidden')
        }
    </script>
</body>
</html>
