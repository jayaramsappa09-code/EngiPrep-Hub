                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>

    <main class="max-w-4xl mx-auto px-6 pt-32 pb-32">
        <header class="mb-12">
            <div class="flex items-center gap-4 mb-6">
                <div id="current-avatar-preview" class="w-20 h-20 rounded-[2rem] bg-slate-200 dark:bg-slate-700 p-1 border-2 border-primary/20 shadow-xl shadow-primary/10 overflow-hidden">
                    <div class="w-full h-full rounded-[1.8rem] bg-gray-900 flex items-center justify-center text-2xl font-black text-slate-600 dark:text-slate-400">?</div>
                </div>
                <div>
                    <h1 class="text-4xl font-black italic tracking-tighter">Profile <span class="text-primary">Settings.</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs italic mt-1">Refining your identity on the Hub.</p>
                </div>
            </div>
        </header>

        <form id="profile-form" class="space-y-16">
            <!-- AVATAR MODIFICATION -->
            <section class="animate-fade-up">
                <div class="flex items-center justify-between mb-8 border-b pb-4 border-slate-200 dark:border-slate-800 border">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-primary/60 italic">Shift Your Identity</h2>
                    <span class="text-[8px] font-bold text-slate-600 dark:text-slate-400 uppercase">Avatar System</span>
                </div>
                <div id="avatar-grid" class="grid grid-cols-3 md:grid-cols-6 gap-4">
                    <!-- Avatars Injected -->
                </div>
            </section>

            <!-- PROFILE DATA -->
            <section class="animate-fade-up">
                <div class="flex items-center justify-between mb-8 border-b pb-4 border-slate-200 dark:border-slate-800 border">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-primary/60 italic">Core Information</h2>
                    <span class="text-[8px] font-bold text-slate-600 dark:text-slate-400 uppercase">Verified Data</span>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Unique Username</label>
                            <input type="text" id="username-input" required="" minlength="3" placeholder="alex_codes" class="w-full border-2 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Full Name</label>
                            <input type="text" id="fullname-input" required="" placeholder="Alexander Wright" class="w-full border-2 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Branch</label>
                                <select id="branch-select" required="" class="w-full border-2 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold appearance-none bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                    <option value="CSE">CSE</option>
                                    <option value="ECE">ECE</option>
                                    <option value="EEE">EEE</option>
                                    <option value="MECH">MECH</option>
                                    <option value="CIVIL">CIVIL</option>
                                    <option value="IT">IT</option>
                                    <option value="AI-ML">AI / ML</option>
                                    <option value="OTHER">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Semester</label>
                                <select id="semester-select" required="" class="w-full border-2 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold appearance-none bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                    <option value="1">Sem 1</option>
                                    <option value="2">Sem 2</option>
                                    <option value="3">Sem 3</option>
                                    <option value="4">Sem 4</option>
                                    <option value="5">Sem 5</option>
                                    <option value="6">Sem 6</option>
                                    <option value="7">Sem 7</option>
                                    <option value="8">Sem 8</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Short Bio</label>
                            <textarea id="bio-input" rows="2" placeholder="Tell the community about yourself..." class="w-full border-2 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold resize-none bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <div class="pt-8 border-t flex flex-col sm:flex-row items-center gap-6 border-slate-200 dark:border-slate-800 border">
                <button type="submit" id="save-btn" class="w-full sm:w-auto px-12 py-4 bg-primary text-[#0d0d12] rounded-2xl font-black uppercase tracking-widest text-xs transition-all hover:scale-105 active:scale-95 disabled:opacity-50 shadow-xl shadow-primary/10">
                    Propagate Changes
                </button>
                <p id="save-msg" class="text-[10px] font-black uppercase tracking-widest animate-fade hidden"></p>
            </div>
        </form>
    </main>

    <script type="module">
        import { requireAuth, getUserProfile, updateUserProfile, isUsernameTaken } from './src/supabase.js'
        import { AVATARS } from './src/avatars.js'

        const avatarGrid = document.getElementById('avatar-grid')
        const previewEl = document.getElementById('current-avatar-preview')
        const form = document.getElementById('profile-form')
        const saveBtn = document.getElementById('save-btn')
        const saveMsg = document.getElementById('save-msg')

        let selectedAvatar = null
        let currentUser = null
        let initialUsername = ''

        // Inject Avatars
        AVATARS.forEach(avatar => {
            const div = document.createElement('div')
            div.className = 'avatar-option'
            div.innerHTML = `
                <div class="avatar-inner">
                    <img src="${avatar.url}" class="w-full h-full object-cover">
                </div>
            `
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('active'))
                div.classList.add('active')
                selectedAvatar = avatar.url
                previewEl.innerHTML = `<img src="${avatar.url}" class="w-full h-full rounded-[1.8rem] object-cover">`
            }
            avatarGrid.appendChild(div)
        })

        async function init() {
            currentUser = await requireAuth()
            if (!currentUser) return

            const profile = await getUserProfile(currentUser.id)
                if (profile) {
                    initialUsername = profile.username || ''
                    document.getElementById('username-input').value = profile.username || ''
                    document.getElementById('fullname-input').value = profile.full_name || ''
                    document.getElementById('branch-select').value = profile.branch || 'CSE'
                    document.getElementById('semester-select').value = profile.semester || '1'
                    
                    // Safe check for bio in case of schema cache issues
                    const bioInput = document.getElementById('bio-input');
                    if (bioInput) bioInput.value = (profile && 'bio' in profile) ? (profile.bio || '') : '';
                    
                    if (profile.avatar_url) {
                    selectedAvatar = profile.avatar_url
                    previewEl.innerHTML = `<img src="${profile.avatar_url}" class="w-full h-full rounded-[1.8rem] object-cover animate-fade">`
                    
                    // Mark selected in grid
                    const match = [...avatarGrid.children].find(el => el.querySelector('img').src === profile.avatar_url)
                    if (match) match.classList.add('active')
                }
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault()
            saveBtn.disabled = true
            saveMsg.classList.add('hidden')
            saveMsg.className = 'text-[10px] font-black uppercase tracking-widest text-emerald-500 animate-fade'
            saveMsg.textContent = 'Updating Hub Registry...'
            saveMsg.classList.remove('hidden')

            const newUsername = document.getElementById('username-input').value.trim()
            
            try {
                // Check username if changed
                if (newUsername !== initialUsername) {
                    const taken = await isUsernameTaken(newUsername)
                    if (taken) throw new Error('Divergence: Username already claimed in Hub.')
                }

                const updates = {
                    username: newUsername,
                    full_name: document.getElementById('fullname-input').value.trim(),
                    branch: document.getElementById('branch-select').value,
                    semester: parseInt(document.getElementById('semester-select').value),
                    bio: document.getElementById('bio-input').value.trim(),
                    avatar_url: selectedAvatar
                }

                const { error } = await updateUserProfile(currentUser.id, updates)
                if (error) throw new Error(error)

                saveMsg.textContent = 'Registry Updated Successfully'
                setTimeout(() => {
                    saveMsg.classList.add('hidden')
                    saveBtn.disabled = false
                }, 2000)

            } catch (err) {
                saveMsg.textContent = 'Error: ' + err.message
                saveMsg.classList.add('text-red-500')
                saveBtn.disabled = false
            }
        }

        init()
    </script>
    <script type="module" src="/src/ai-widget.ts"></script>
