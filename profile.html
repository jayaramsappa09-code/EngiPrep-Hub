<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | EngiPrep Hub</title>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0d0d12';
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        @reference "./src/style.css";
        .avatar-option { @apply relative cursor-pointer opacity-60 grayscale transition-all; }
        .avatar-option.active { @apply opacity-100 grayscale-0; }
        .avatar-option.active .avatar-inner { @apply ring-2 ring-primary bg-primary/10; }
        .avatar-inner { @apply w-full aspect-square rounded-2xl border border-white/5 bg-white/[0.02] p-2 transition-all; }
        .avatar-option:hover { @apply opacity-100; }
    </style>
</head>
<body class="bg-[#0d0d12] text-white font-sans selection:bg-primary/30 selection:text-primary">

    <nav class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-border px-6">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
            <a href="/dashboard.html" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center group-hover:bg-primary group-hover:text-[#0d0d12] transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </div>
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-500 group-hover:text-white transition-colors">Return to Dashboard</span>
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-32 pb-32">
        <header class="mb-12">
            <div class="flex items-center gap-4 mb-6">
                <div id="current-avatar-preview" class="w-20 h-20 rounded-[2rem] bg-white/5 p-1 border-2 border-primary/20 shadow-xl shadow-primary/10 overflow-hidden">
                    <div class="w-full h-full rounded-[1.8rem] bg-gray-900 flex items-center justify-center text-2xl font-black text-gray-600">?</div>
                </div>
                <div>
                    <h1 class="text-4xl font-black italic tracking-tighter">Profile <span class="text-primary">Settings.</span></h1>
                    <p class="text-gray-500 text-xs italic mt-1">Refining your identity on the Hub.</p>
                </div>
            </div>
        </header>

        <form id="profile-form" class="space-y-16">
            <!-- AVATAR MODIFICATION -->
            <section class="animate-fade-up">
                <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-primary/60 italic">Shift Your Identity</h2>
                    <span class="text-[8px] font-bold text-gray-600 uppercase">Avatar System</span>
                </div>
                <div id="avatar-grid" class="grid grid-cols-3 md:grid-cols-6 gap-4">
                    <!-- Avatars Injected -->
                </div>
            </section>

            <!-- PROFILE DATA -->
            <section class="animate-fade-up">
                <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-primary/60 italic">Core Information</h2>
                    <span class="text-[8px] font-bold text-gray-600 uppercase">Verified Data</span>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">Unique Username</label>
                            <input type="text" id="username-input" required minlength="3" placeholder="alex_codes" 
                                class="w-full bg-white/[0.03] border-2 border-white/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">Full Name</label>
                            <input type="text" id="fullname-input" required placeholder="Alexander Wright" 
                                class="w-full bg-white/[0.03] border-2 border-white/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold">
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">Branch</label>
                                <select id="branch-select" required class="w-full bg-white/[0.03] border-2 border-white/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold appearance-none">
                                    <option value="CSE">CSE</option>
                                    <option value="ECE">ECE</option>
                                    <option value="EEE">EEE</option>
                                    <option value="MECH">MECH</option>
                                    <option value="CIVIL">CIVIL</option>
                                    <option value="IT">IT</option>
                                    <option value="AI-ML">AI / ML</option>
                                    <option value="OTHER">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">Semester</label>
                                <select id="semester-select" required class="w-full bg-white/[0.03] border-2 border-white/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold appearance-none">
                                    <option value="1">Sem 1</option>
                                    <option value="2">Sem 2</option>
                                    <option value="3">Sem 3</option>
                                    <option value="4">Sem 4</option>
                                    <option value="5">Sem 5</option>
                                    <option value="6">Sem 6</option>
                                    <option value="7">Sem 7</option>
                                    <option value="8">Sem 8</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">Short Bio</label>
                            <textarea id="bio-input" rows="2" placeholder="Tell the community about yourself..." 
                                class="w-full bg-white/[0.03] border-2 border-white/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold resize-none"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <div class="pt-8 border-t border-white/5 flex flex-col sm:flex-row items-center gap-6">
                <button type="submit" id="save-btn" class="w-full sm:w-auto px-12 py-4 bg-primary text-[#0d0d12] rounded-2xl font-black uppercase tracking-widest text-xs transition-all hover:scale-105 active:scale-95 disabled:opacity-50 shadow-xl shadow-primary/10">
                    Propagate Changes
                </button>
                <p id="save-msg" class="text-[10px] font-black uppercase tracking-widest animate-fade hidden"></p>
            </div>
        </form>
    </main>

    <script type="module">
        import { requireAuth, getUserProfile, updateUserProfile, isUsernameTaken } from './src/supabase.js'
        import { AVATARS } from './src/avatars.js'

        const avatarGrid = document.getElementById('avatar-grid')
        const previewEl = document.getElementById('current-avatar-preview')
        const form = document.getElementById('profile-form')
        const saveBtn = document.getElementById('save-btn')
        const saveMsg = document.getElementById('save-msg')

        let selectedAvatar = null
        let currentUser = null
        let initialUsername = ''

        // Inject Avatars
        AVATARS.forEach(avatar => {
            const div = document.createElement('div')
            div.className = 'avatar-option'
            div.innerHTML = `
                <div class="avatar-inner">
                    <img src="${avatar.url}" class="w-full h-full object-cover">
                </div>
            `
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('active'))
                div.classList.add('active')
                selectedAvatar = avatar.url
                previewEl.innerHTML = `<img src="${avatar.url}" class="w-full h-full rounded-[1.8rem] object-cover">`
            }
            avatarGrid.appendChild(div)
        })

        async function init() {
            currentUser = await requireAuth()
            if (!currentUser) return

            const profile = await getUserProfile(currentUser.id)
            if (profile) {
                initialUsername = profile.username || ''
                document.getElementById('username-input').value = profile.username || ''
                document.getElementById('fullname-input').value = profile.full_name || ''
                document.getElementById('branch-select').value = profile.branch || 'CSE'
                document.getElementById('semester-select').value = profile.semester || '1'
                document.getElementById('bio-input').value = profile.bio || ''
                
                if (profile.avatar_url) {
                    selectedAvatar = profile.avatar_url
                    previewEl.innerHTML = `<img src="${profile.avatar_url}" class="w-full h-full rounded-[1.8rem] object-cover animate-fade">`
                    
                    // Mark selected in grid
                    const match = [...avatarGrid.children].find(el => el.querySelector('img').src === profile.avatar_url)
                    if (match) match.classList.add('active')
                }
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault()
            saveBtn.disabled = true
            saveMsg.classList.add('hidden')
            saveMsg.className = 'text-[10px] font-black uppercase tracking-widest text-emerald-500 animate-fade'
            saveMsg.textContent = 'Updating Hub Registry...'
            saveMsg.classList.remove('hidden')

            const newUsername = document.getElementById('username-input').value.trim()
            
            try {
                // Check username if changed
                if (newUsername !== initialUsername) {
                    const taken = await isUsernameTaken(newUsername)
                    if (taken) throw new Error('Divergence: Username already claimed in Hub.')
                }

                const updates = {
                    username: newUsername,
                    full_name: document.getElementById('fullname-input').value.trim(),
                    branch: document.getElementById('branch-select').value,
                    semester: parseInt(document.getElementById('semester-select').value),
                    bio: document.getElementById('bio-input').value.trim(),
                    avatar_url: selectedAvatar
                }

                const { error } = await updateUserProfile(currentUser.id, updates)
                if (error) throw new Error(error)

                saveMsg.textContent = 'Registry Updated Successfully'
                setTimeout(() => {
                    saveMsg.classList.add('hidden')
                    saveBtn.disabled = false
                }, 2000)

            } catch (err) {
                saveMsg.textContent = 'Error: ' + err.message
                saveMsg.classList.add('text-red-500')
                saveBtn.disabled = false
            }
        }

        init()
    </script>
</body>
</html>
