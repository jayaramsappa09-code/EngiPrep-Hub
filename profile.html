                            <input type="text" id="username-input" required minlength="3" placeholder="alex_codes"

                                class="w-full border-2 rounded-2xl px-6 py-4 focus:outline-none focus:border-primary transition-all font-bold bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        </div>

                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">

                                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Branch</label>

                <p id="save-msg" class="text-[10px] font-black uppercase tracking-widest animate-fade hidden"></p>

    <script type="module">
        import { requireAuth, getUserProfile, updateUserProfile, isUsernameTaken } from './src/supabase.js'
        import { AVATARS } from './src/avatars.js'

        const avatarGrid = document.getElementById('avatar-grid')
        const previewEl = document.getElementById('current-avatar-preview')
        const form = document.getElementById('profile-form')
        const saveBtn = document.getElementById('save-btn')
        const saveMsg = document.getElementById('save-msg')

        let selectedAvatar = null
        let currentUser = null
        let initialUsername = ''

        // Inject Avatars
        AVATARS.forEach(avatar => {
            const div = document.createElement('div')
            div.className = 'avatar-option'
            div.innerHTML = `
                <div class="avatar-inner">
                    <img loading="lazy" decoding="async" src="${avatar.url}" class="w-full h-full object-cover">
                </div>
            `
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('active'))
                div.classList.add('active')
                selectedAvatar = avatar.url
                previewEl.innerHTML = `<img loading="lazy" decoding="async" src="${avatar.url}" class="w-full h-full rounded-[1.8rem] object-cover">`
            }
            avatarGrid.appendChild(div)
        })

        async function init() {
            currentUser = await requireAuth()
            if (!currentUser) return

            const profile = await getUserProfile(currentUser.id)
                if (profile) {
                    initialUsername = profile.username || ''
                    document.getElementById('username-input').value = profile.username || ''
                    document.getElementById('fullname-input').value = profile.full_name || ''
                    document.getElementById('branch-select').value = profile.branch || 'CSE'
                    document.getElementById('semester-select').value = profile.semester || '1'
                    
                    // Safe check for bio in case of schema cache issues
                    const bioInput = document.getElementById('bio-input');
                    if (bioInput) bioInput.value = (profile && 'bio' in profile) ? (profile.bio || '') : '';
                    
                    if (profile.avatar_url) {
                    selectedAvatar = profile.avatar_url
                    previewEl.innerHTML = `<img loading="lazy" decoding="async" src="${profile.avatar_url}" class="w-full h-full rounded-[1.8rem] object-cover animate-fade">`
                    
                    // Mark selected in grid
                    const match = [...avatarGrid.children].find(el => el.querySelector('img').src === profile.avatar_url)
                    if (match) match.classList.add('active')
                }
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault()
            saveBtn.disabled = true
            saveMsg.classList.add('hidden')
            saveMsg.className = 'text-[10px] font-black uppercase tracking-widest text-emerald-500 animate-fade'
            saveMsg.textContent = 'Updating Hub Registry...'
            saveMsg.classList.remove('hidden')

            const newUsername = document.getElementById('username-input').value.trim()
            
            try {
                // Check username if changed
                if (newUsername !== initialUsername) {
                    const taken = await isUsernameTaken(newUsername)
                    if (taken) throw new Error('Divergence: Username already claimed in Hub.')
                }

                const updates = {
                    username: newUsername,
                    full_name: document.getElementById('fullname-input').value.trim(),
                    branch: document.getElementById('branch-select').value,
                    semester: parseInt(document.getElementById('semester-select').value),
                    bio: document.getElementById('bio-input').value.trim(),
                    avatar_url: selectedAvatar
                }

                const { error } = await updateUserProfile(currentUser.id, updates)
                if (error) throw new Error(error)

                saveMsg.textContent = 'Registry Updated Successfully'
                setTimeout(() => {
                    saveMsg.classList.add('hidden')
                    saveBtn.disabled = false
                }, 2000)

            } catch (err) {
                saveMsg.textContent = 'Error: ' + err.message
                saveMsg.classList.add('text-red-500')
                saveBtn.disabled = false
            }
        }

        init()
    </script>
