<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Notes – EngiPrep Hub</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#0a0a0f]">
    <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-lg border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center font-black">E</div>
                <span class="font-black text-lg tracking-tight uppercase">EngiPrep Hub</span>
            </a>
            <div id="nav-actions" class="flex items-center gap-4">
                <div class="skeleton w-20 h-8 opacity-20"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-32 pb-20">
        <header class="mb-16">
            <div id="subject-badge" class="inline-block px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-[10px] font-black uppercase tracking-widest mb-4">...</div>
            <h1 id="subject-title" class="text-4xl md:text-6xl font-black mb-4">...</h1>
            <p id="subject-desc" class="text-gray-400 max-w-2xl">Access all curated academic resources for this subject below.</p>
        </header>

        <!-- Dynamic Content Tabs -->
        <div class="flex flex-col lg:flex-row gap-8 mb-10">
            <div id="filter-tabs" class="flex flex-wrap items-center gap-2 p-1 bg-white/5 border border-white/5 rounded-2xl w-fit h-fit">
                <button data-type="all" class="filter-btn px-6 py-2.5 rounded-xl bg-primary text-black text-[10px] font-black uppercase tracking-widest shadow-lg shadow-primary/20 transition-all">All Archive</button>
                <button data-type="notes" class="filter-btn px-6 py-2.5 rounded-xl hover:bg-white/5 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all">Full Notes</button>
                <button data-type="cheat-sheet" class="filter-btn px-6 py-2.5 rounded-xl hover:bg-white/5 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all">Cheat Sheets</button>
                <button data-type="PYQ" class="filter-btn px-6 py-2.5 rounded-xl hover:bg-white/5 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all">Exam PYQs</button>
                <button data-type="Revision" class="filter-btn px-6 py-2.5 rounded-xl hover:bg-white/5 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all">Revision</button>
            </div>

            <!-- 1-Day Revision Toggle -->
            <button id="revision-mode-btn" class="flex items-center gap-3 px-8 py-3 rounded-2xl bg-amber-500/10 border border-amber-500/20 text-amber-500 group hover:bg-amber-500/20 transition-all ml-auto">
                <div class="w-8 h-8 bg-amber-500/20 rounded-lg flex items-center justify-center animate-pulse group-hover:scale-110 transition-transform">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="text-left">
                    <div class="text-[10px] font-black uppercase tracking-widest leading-none">Exam Mode</div>
                    <div class="text-[9px] text-amber-500/60 font-bold uppercase tracking-tight">1-Day Before Prep</div>
                </div>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div id="notes-grid" class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Loading Skeletons -->
                <div class="skeleton h-60 w-full rounded-2xl"></div>
                <div class="skeleton h-60 w-full rounded-2xl"></div>
                <div class="skeleton h-60 w-full rounded-2xl"></div>
            </div>

            <!-- PYQ Intelligence Sidebar -->
            <aside class="space-y-6">
                <!-- Subject Recommendations -->
                <div class="glass-card p-6 border-primary/20 bg-primary/[0.02]">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-sm font-black italic tracking-tight">Smart <span class="text-primary">Recommendations</span></h3>
                        <div class="px-2 py-0.5 bg-primary/20 text-primary text-[8px] font-black rounded uppercase">Based on Weightage</div>
                    </div>
                    <div id="smart-predictions" class="space-y-4">
                        <div class="skeleton h-12 w-full rounded-xl opacity-20"></div>
                    </div>
                </div>

                <!-- Unit Importance Heatmap -->
                <div class="glass-card p-6 border-white/5">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-6">Type Density Heatmap</h3>
                    <div id="heatmap-container" class="space-y-3">
                        <!-- Dynamic bars -->
                    </div>
                </div>

                <div class="glass-card p-6 border-blue-500/10">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-sm font-black italic tracking-tight"><span class="text-blue-500">PYQ</span> Weightage</h3>
                        <div class="px-2 py-0.5 bg-blue-500/20 text-blue-500 text-[8px] font-black rounded uppercase">Live Trends</div>
                    </div>
                    <div id="pyq-analytics" class="space-y-4">
                        <div class="skeleton h-12 w-full rounded-xl opacity-20"></div>
                        <div class="skeleton h-12 w-full rounded-xl opacity-10"></div>
                    </div>
                </div>

                <div class="glass-card p-6 border-gray-500/10">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-4">Subject Stats</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <div class="text-lg font-black text-white" id="stat-pyq-count">0</div>
                            <div class="text-[8px] text-gray-600 uppercase font-bold">Solved PYQs</div>
                        </div>
                        <div class="text-center">
                            <div class="text-lg font-black text-white">94%</div>
                            <div class="text-[8px] text-gray-600 uppercase font-bold">Accuracy</div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script type="module">
        import { fetchNotesBySubject, fetchPYQAnalytics, fetchRevisionNotes, fetchSubjectInsights } from './src/notes.js'
        import { supabase } from './src/supabase.js'
        
        const params = new URLSearchParams(window.location.search)
        const subject = params.get('sub') || 'Mathematics I'
        let currentNotes = []
        let currentFilter = 'all'
        let isExamMode = false

        document.getElementById('subject-title').innerText = subject
        document.title = `${subject} – Academic Archive`

        async function loadContent() {
            try {
                // Parallel load
                const [notes, pyqs, insights] = await Promise.all([
                    fetchNotesBySubject(subject),
                    fetchPYQAnalytics(subject),
                    fetchSubjectInsights(subject)
                ])

                currentNotes = notes
                renderGrid()
                renderAnalytics(pyqs)
                renderInsights(insights)
            } catch (err) {
                console.error(err)
            }
        }

        function renderInsights(insights) {
            const predContainer = document.getElementById('smart-predictions')
            const heatmapContainer = document.getElementById('heatmap-container')

            // Predicted Questions
            if (insights.expected.length === 0) {
                predContainer.innerHTML = '<p class="text-[10px] text-gray-600 italic">Not enough data for predictions.</p>'
            } else {
                predContainer.innerHTML = insights.expected.slice(0, 3).map(n => `
                    <a href="/note-viewer.html?slug=${n.slug}" class="block group">
                        <div class="text-[10px] font-bold text-white group-hover:text-amber-500 transition-colors truncate">${n.title}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[8px] text-gray-500 uppercase font-black tracking-tight">${n.type}</span>
                            <span class="text-[8px] text-emerald-500 font-bold uppercase">${Math.round((n.weightage + n.frequency)/10 * 100)}% Match</span>
                        </div>
                    </a>
                `).join('')
            }

            // Heatmap
            const totalWeight = Object.values(insights.heatmap).reduce((a, b) => a + b, 0)
            heatmapContainer.innerHTML = Object.entries(insights.heatmap).map(([type, weight]) => `
                <div class="space-y-1">
                    <div class="flex justify-between text-[8px] uppercase font-black tracking-widest text-gray-400">
                        <span>${type}</span>
                        <span>${Math.round((weight/totalWeight)*100)}%</span>
                    </div>
                    <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-primary" style="width: ${(weight/totalWeight)*100}%"></div>
                    </div>
                </div>
            `).join('')
        }

        function renderAnalytics(pyqs) {
            const container = document.getElementById('pyq-analytics')
            const countDisplay = document.getElementById('stat-pyq-count')
            
            countDisplay.innerText = pyqs.length
            
            if (pyqs.length === 0) {
                container.innerHTML = '<p class="text-[10px] text-gray-600 italic py-4">No PYQ trends tracked yet.</p>'
                return
            }

            container.innerHTML = pyqs.slice(0, 5).map(q => `
                <div class="space-y-1.5 group cursor-help">
                    <div class="flex justify-between items-end">
                        <span class="text-[10px] font-bold text-gray-400 group-hover:text-blue-400 transition-colors truncate max-w-[150px]">${q.title}</span>
                        <span class="text-[9px] font-black text-blue-500">${q.frequency}x Asked</span>
                    </div>
                    <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 transition-all duration-1000 ease-out" style="width: ${Math.min(q.frequency * 20, 100)}%"></div>
                    </div>
                </div>
            `).join('')
        }

        function renderGrid() {
            const grid = document.getElementById('notes-grid')
            
            let filtered = currentFilter === 'all' 
                ? currentNotes 
                : currentNotes.filter(n => n.type === currentFilter)
            
            if (isExamMode) {
                // In Exam Mode, we show only High Weightage (4-5) and Revision type
                filtered = currentNotes.filter(n => n.type === 'Revision' || n.weightage >= 4)
                // Sort by weightage
                filtered.sort((a,b) => b.weightage - a.weightage)
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-32 text-center glass-card bg-white/[0.01]">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">
                             <svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        </div>
                        <h3 class="text-xl font-bold mb-2">${isExamMode ? 'No high-priority topics yet' : `No ${currentFilter} found`}</h3>
                        <p class="text-gray-500 text-sm max-w-xs mx-auto">We're still curating these specialized resources for ${subject}. Check back soon!</p>
                    </div>
                `
                return
            }

            grid.innerHTML = filtered.map(note => `
                <div class="glass-card flex flex-col group p-2 hover:translate-y-[-4px] transition-all ${note.weightage >= 5 ? 'border-primary/20 shadow-[0_0_20px_rgba(255,255,255,0.02)]' : ''}">
                    <div class="aspect-video w-full bg-[#111118] rounded-xl mb-4 overflow-hidden relative border border-white/5">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] to-transparent opacity-60"></div>
                        <div class="absolute bottom-4 left-4 flex gap-2">
                            <span class="px-2 py-1 bg-primary text-black text-[8px] font-black uppercase rounded">${note.type}</span>
                            ${note.weightage >= 5 ? '<span class="px-2 py-1 bg-amber-500 text-black text-[8px] font-black uppercase rounded">Critical</span>' : ''}
                        </div>
                        ${note.frequency > 1 ? `
                            <div class="absolute top-4 left-4 px-2 py-1 bg-blue-500/80 backdrop-blur-md text-white text-[8px] font-black uppercase rounded">
                                Exam Freq: ${note.frequency}x
                            </div>
                        ` : ''}
                        <div class="absolute top-4 right-4 group-hover:scale-110 transition-transform">
                             <div class="w-8 h-8 bg-black/40 backdrop-blur-md rounded-lg flex items-center justify-center border border-white/10">
                                <span class="text-[10px] font-black text-primary">${note.subject.charAt(0)}</span>
                             </div>
                        </div>
                    </div>
                    <div class="px-4 pb-6 flex-1">
                        <h3 class="text-lg font-bold mb-3 tracking-tight group-hover:text-primary transition-colors line-clamp-1">${note.title}</h3>
                        <p class="text-gray-500 text-[11px] mb-6 line-clamp-2 leading-relaxed italic">${note.content.replace(/<[^>]*>/g, '').substring(0, 80)}...</p>
                        
                        <div class="flex items-center justify-between border-t border-white/5 pt-4">
                            <a href="/note-viewer.html?slug=${note.slug}" class="text-[10px] font-black uppercase tracking-widest text-primary hover:tracking-[0.2em] transition-all">Access Now →</a>
                            <div class="flex items-center gap-1 text-[9px] text-gray-600 font-bold uppercase tracking-widest">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                5 Min
                            </div>
                        </div>
                    </div>
                </div>
            `).join('')
        }

        // Exam Mode Toggle
        document.getElementById('revision-mode-btn').addEventListener('click', function() {
            isExamMode = !isExamMode
            this.classList.toggle('bg-amber-500/10')
            this.classList.toggle('bg-amber-500')
            this.classList.toggle('text-amber-500')
            this.classList.toggle('text-black')
            
            document.getElementById('filter-tabs').classList.toggle('opacity-20')
            document.getElementById('filter-tabs').classList.toggle('pointer-events-none')
            
            renderGrid()
        })

        // Filter Logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isExamMode) return

                btn.parentElement.querySelectorAll('.filter-btn').forEach(b => {
                    b.className = 'filter-btn px-6 py-2.5 rounded-xl hover:bg-white/5 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all'
                })
                btn.className = 'filter-btn px-6 py-2.5 rounded-xl bg-primary text-black text-[10px] font-black uppercase tracking-widest shadow-lg shadow-primary/20 transition-all'
                
                currentFilter = btn.dataset.type
                renderGrid()
            })
        })

        loadContent()
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
