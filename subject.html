<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Notes – EngiPrep Hub</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#0a0a0f]">
    <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-lg border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center font-black">E</div>
                <span class="font-black text-lg tracking-tight uppercase">EngiPrep Hub</span>
            </a>
            <div id="nav-actions" class="flex items-center gap-4">
                <div class="skeleton w-20 h-8 opacity-20"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-32 pb-20">
        <header class="mb-16">
            <div id="subject-badge" class="inline-block px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-[10px] font-black uppercase tracking-widest mb-4">...</div>
            <h1 id="subject-title" class="text-4xl md:text-6xl font-black mb-4">...</h1>
            <p id="subject-desc" class="text-gray-400 max-w-2xl">Access all curated academic resources for this subject below.</p>
        </header>

        <!-- Dynamic Content Tabs -->
        <div class="flex items-center gap-2 mb-8 p-1 bg-white/5 border border-white/5 rounded-xl w-fit">
            <button class="px-6 py-2 rounded-lg bg-primary text-sm font-bold shadow-lg shadow-primary/20">All Notes</button>
            <button class="px-6 py-2 rounded-lg hover:bg-white/5 text-sm font-bold text-gray-500 hover:text-white transition-all">Cheat Sheets</button>
            <button class="px-6 py-2 rounded-lg hover:bg-white/5 text-sm font-bold text-gray-500 hover:text-white transition-all">Programs</button>
        </div>

        <div id="notes-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Loading Skeletons -->
            <div class="skeleton h-48 w-full"></div>
            <div class="skeleton h-48 w-full"></div>
        </div>
    </main>

    <script type="module">
        import { fetchNotesBySubject } from './src/notes.js'
        
        const params = new URLSearchParams(window.location.search)
        const subject = params.get('sub') || 'Mathematics I'

        document.getElementById('subject-title').innerText = subject
        document.getElementById('subject-badge').innerText = `JNTUK R23 • ${subject}`

        async function loadContent() {
            try {
                const notes = await fetchNotesBySubject(subject)
                const grid = document.getElementById('notes-grid')
                
                if (notes.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-20 text-center glass-card">
                            <h3 class="text-xl font-bold mb-2">No notes found yet.</h3>
                            <p class="text-gray-500">Admins will upload premium resources for ${subject} soon.</p>
                        </div>
                    `
                    return
                }

                grid.innerHTML = notes.map(note => `
                    <div class="glass-card p-8 group relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 -mr-12 -mt-12 rounded-full blur-3xl group-hover:bg-primary/10 transition-all"></div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-widest font-black mb-4 flex items-center justify-between">
                            <span>${note.type}</span>
                            <span>${new Date(note.created_at).toLocaleDateString()}</span>
                        </div>
                        <h3 class="text-2xl font-bold mb-4 group-hover:text-primary transition-colors">${note.title}</h3>
                        <p class="text-gray-400 text-sm mb-8 line-clamp-2">${note.content.replace(/<[^>]*>/g, '').substring(0, 100)}...</p>
                        <div class="flex items-center justify-between">
                            <a href="/note-viewer.html?slug=${note.slug}" class="btn-primary py-2 px-6 text-xs">Read Full Note</a>
                            <button class="p-2 text-gray-500 hover:text-primary transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                            </button>
                        </div>
                    </div>
                `).join('')
            } catch (err) {
                console.error(err)
            }
        }

        loadContent()
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
