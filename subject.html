<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Resources | EngiPrep Hub</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#f8fafc] text-slate-800 selection:bg-blue-100">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20 group-hover:rotate-12 transition-transform">
                    <span class="font-bold text-xl">E</span>
                </div>
                <span class="text-xl font-extrabold tracking-tight text-slate-900">EngiPrep <span class="text-blue-600">Hub</span></span>
            </a>
            
            <div id="nav-actions" class="flex items-center gap-4">
                <div class="skeleton w-32 h-10 opacity-20"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        <!-- Subject Header -->
        <header class="mb-12 animate-fade-up">
            <div id="subject-badge" class="inline-block px-4 py-1.5 rounded-full bg-blue-50 border border-blue-100 text-blue-600 text-[10px] font-bold uppercase tracking-widest mb-6">Subject Archive</div>
            <h1 id="subject-title" class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-4">...</h1>
            <p id="subject-desc" class="text-slate-500 max-w-2xl text-lg font-medium leading-relaxed">Access well-structured notes, previous year questions, and rapid revision guides for this subject.</p>
        </header>

        <!-- Controls Layer -->
        <div class="flex flex-col lg:flex-row gap-6 mb-12 animate-fade-up" style="animation-delay: 0.1s">
            <div id="filter-tabs" class="flex flex-wrap items-center gap-2 p-1.5 bg-white border border-slate-100 rounded-2xl shadow-sm h-fit">
                <button data-type="all" class="filter-btn px-6 py-2 rounded-xl bg-blue-600 text-white text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all">All Archive</button>
                <button data-type="notes" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-all">Full Notes</button>
                <button data-type="cheat-sheet" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-all">Cheat Sheets</button>
                <button data-type="PYQ" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-all">Exam PYQs</button>
                <button data-type="Revision" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-all">Revision</button>
            </div>

            <!-- Exam Mode Toggle -->
            <button id="exam-mode-btn" class="flex items-center gap-4 px-8 py-3 rounded-2xl bg-amber-50 border border-amber-100 text-amber-600 group hover:bg-amber-100 transition-all ml-auto">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="text-left">
                    <div class="text-[10px] font-black uppercase tracking-widest leading-none">Exam Survival Mode</div>
                    <div class="text-[9px] text-amber-500/60 font-bold uppercase tracking-tight mt-1">Focus only on High Weightage</div>
                </div>
            </button>
        </div>

        <!-- Master Content Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Resource Grid -->
            <div id="notes-grid" class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-8 animate-fade-up" style="animation-delay: 0.2s">
                <!-- Loader Skeletons -->
                <div class="skeleton h-64 w-full rounded-3xl"></div>
                <div class="skeleton h-64 w-full rounded-3xl"></div>
                <div class="skeleton h-64 w-full rounded-3xl"></div>
                <div class="skeleton h-64 w-full rounded-3xl"></div>
            </div>

            <!-- Subject Intelligence Sidebar -->
            <aside class="space-y-8 animate-fade-up" style="animation-delay: 0.3s">
                <!-- Smart Recommendations -->
                <div class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Next Focus</h3>
                        <span class="px-2 py-0.5 bg-blue-50 text-blue-600 text-[8px] font-bold rounded uppercase">Weightage based</span>
                    </div>
                    <div id="smart-predictions" class="space-y-4">
                        <div class="skeleton h-14 w-full opacity-50"></div>
                        <div class="skeleton h-14 w-full opacity-30"></div>
                    </div>
                </div>

                <!-- Analysis Sidebar -->
                <div class="bg-slate-900 rounded-3xl p-8 text-white relative overflow-hidden group">
                    <div class="absolute -right-16 -top-16 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl group-hover:scale-110 transition-transform"></div>
                    <div class="relative z-10">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Exam Analysis</h3>
                        <div id="pyq-analytics" class="space-y-6">
                             <div class="skeleton h-20 w-full bg-white/5 opacity-50"></div>
                        </div>
                    </div>
                </div>

                <!-- Fast Actions -->
                <div class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 font-bold">Academic Tools</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <a href="/tools.html" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all gap-2 group">
                            <span class="text-xl group-hover:scale-110 transition-transform">📊</span>
                            <span class="text-[9px] font-bold uppercase tracking-widest">Calculators</span>
                        </a>
                        <a href="/ai-professor.html" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all gap-2 group">
                            <span class="text-xl group-hover:scale-110 transition-transform">🤖</span>
                            <span class="text-[9px] font-bold uppercase tracking-widest">Ask AI</span>
                        </a>
                    </div>
                </div>

                <!-- Explore Others -->
                <div id="popular-subjects-container" class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm hidden">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 font-bold">Related Branches</h3>
                    <div id="popular-subjects-list" class="space-y-4">
                        <!-- Injected -->
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script type="module">
        import { fetchNotesBySubject, fetchPYQAnalytics, fetchSubjectInsights, fetchPopularSubjects } from './src/notes.js'
        import { supabase } from './src/supabase.js'
        
        const params = new URLSearchParams(window.location.search)
        const subject = params.get('sub') || 'Mathematics I'
        let currentNotes = []
        let currentFilter = 'all'
        let isExamMode = false

        document.getElementById('subject-title').innerText = subject
        document.title = `${subject} – Premium Resources | EngiPrep Hub`

        async function loadContent() {
            try {
                const [notes, pyqs, insights] = await Promise.all([
                    fetchNotesBySubject(subject),
                    fetchPYQAnalytics(subject),
                    fetchSubjectInsights(subject)
                ])

                currentNotes = notes
                renderGrid()
                renderAnalytics(pyqs)
                renderInsights(insights)
                loadRelatedSubjects()
            } catch (err) { console.error(err) }
        }

        async function loadRelatedSubjects() {
            try {
                const popular = await fetchPopularSubjects(4)
                const filtered = popular.filter(s => s !== subject)
                
                if (filtered.length > 0) {
                    document.getElementById('popular-subjects-container').classList.remove('hidden')
                    document.getElementById('popular-subjects-list').innerHTML = filtered.map(sub => `
                        <a href="/subject.html?sub=${encodeURIComponent(sub)}" class="flex items-center gap-3 group">
                            <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-xs group-hover:bg-blue-50 transition-colors">📚</div>
                            <span class="text-[11px] font-bold text-slate-600 group-hover:text-blue-600 transition-colors truncate">${sub}</span>
                        </a>
                    `).join('')
                }
            } catch (err) { console.error(err) }
        }

        function renderInsights(insights) {
            const predContainer = document.getElementById('smart-predictions')
            if (!insights.expected || insights.expected.length === 0) {
                predContainer.innerHTML = '<p class="text-xs text-slate-400 italic">Exploring curriculum patterns...</p>'
            } else {
                predContainer.innerHTML = insights.expected.slice(0, 3).map(n => `
                    <a href="/note-viewer.html?slug=${n.slug}" class="block group">
                        <h4 class="text-xs font-bold text-slate-700 group-hover:text-blue-600 transition-colors truncate mb-1">${n.title}</h4>
                        <div class="flex items-center gap-2">
                            <span class="px-1.5 py-0.5 bg-slate-100 text-slate-400 text-[8px] font-bold uppercase rounded">${n.type}</span>
                            <span class="text-[8px] text-emerald-500 font-bold uppercase">${Math.round((n.weightage + n.frequency)/10 * 100)}% PRIORITY</span>
                        </div>
                    </a>
                `).join('')
            }
        }

        function renderAnalytics(pyqs) {
            const container = document.getElementById('pyq-analytics')
            if (pyqs.length === 0) {
                container.innerHTML = '<p class="text-xs text-slate-500 italic">No historical data found yet.</p>'
                return
            }
            container.innerHTML = pyqs.slice(0, 3).map(q => `
                <div class="space-y-2 group">
                    <div class="flex justify-between items-end gap-2">
                        <span class="text-xs font-bold text-slate-200 truncate group-hover:text-blue-400 transition-colors">${q.title}</span>
                        <span class="text-[9px] font-black text-blue-400 uppercase shrink-0">${q.frequency}x Asked</span>
                    </div>
                    <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)] transition-all duration-1000" style="width: ${Math.min(q.frequency * 20, 100)}%"></div>
                    </div>
                </div>
            `).join('')
        }

        function renderGrid() {
            const grid = document.getElementById('notes-grid')
            let filtered = currentFilter === 'all' ? currentNotes : currentNotes.filter(n => n.type === currentFilter)
            
            if (isExamMode) {
                filtered = currentNotes.filter(n => n.type === 'Revision' || n.weightage >= 4)
                filtered.sort((a,b) => b.weightage - a.weightage)
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-32 text-center bg-white border border-slate-100 rounded-[2.5rem]"><span class="text-4xl mb-4 block">🔍</span><h3 class="text-xl font-bold mb-2">No resources found</h3><p class="text-slate-400 text-sm">We're still curating these specialized notes.</p></div>`
                return
            }

            grid.innerHTML = filtered.map(note => `
                <div class="bg-white border border-slate-100 rounded-[2.5rem] p-4 group hover:shadow-xl hover:shadow-blue-500/5 hover:-translate-y-1 transition-all ${note.weightage >= 5 ? 'ring-2 ring-blue-500/20' : ''}">
                    <div class="aspect-[16/10] w-full bg-slate-50 rounded-[1.75rem] mb-6 relative overflow-hidden border border-slate-100">
                        <div class="absolute inset-0 bg-gradient-to-t from-white/20 to-transparent"></div>
                        <div class="absolute bottom-4 left-4 flex gap-2">
                            <span class="px-3 py-1 bg-white/90 backdrop-blur-md text-slate-800 text-[8px] font-bold uppercase rounded-lg shadow-sm">${note.type}</span>
                            ${note.weightage >= 5 ? '<span class="px-3 py-1 bg-rose-500 text-white text-[8px] font-black uppercase rounded-lg shadow-sm">High Priority</span>' : ''}
                        </div>
                    </div>
                    <div class="px-4 pb-4">
                        <h3 class="text-xl font-extrabold text-slate-900 mb-3 tracking-tight group-hover:text-blue-600 transition-colors line-clamp-1">${note.title}</h3>
                        <p class="text-slate-500 text-xs font-medium mb-8 line-clamp-2 leading-relaxed">${note.content.replace(/<[^>]*>/g, '').substring(0, 100)}...</p>
                        <div class="flex items-center justify-between pt-6 border-t border-slate-50">
                            <a href="/note-viewer.html?slug=${note.slug}" class="text-[10px] font-black uppercase tracking-widest text-blue-600">Access Notes →</a>
                            <span class="text-[9px] text-slate-300 font-bold uppercase">5 Min Read</span>
                        </div>
                    </div>
                </div>
            `).join('')
        }

        // Exam Mode Toggle
        const examModeBtn = document.getElementById('exam-mode-btn')
        examModeBtn.addEventListener('click', function() {
            isExamMode = !isExamMode
            this.classList.toggle('bg-amber-50')
            this.classList.toggle('bg-amber-500')
            this.classList.toggle('text-amber-600')
            this.classList.toggle('text-white')
            document.getElementById('filter-tabs').classList.toggle('opacity-30')
            document.getElementById('filter-tabs').classList.toggle('pointer-events-none')
            renderGrid()
        })

        // Filter Handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isExamMode) return
                document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-all')
                btn.className = 'filter-btn px-6 py-2 rounded-xl bg-blue-600 text-white text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all'
                currentFilter = btn.dataset.type
                renderGrid()
            })
        })

        loadContent()
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
