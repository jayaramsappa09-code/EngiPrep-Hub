<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Resources | EngiPrep Hub</title>
    <link rel="stylesheet" href="/src/style.css">

    <!-- Gatekeeper for Authentication -->
    <script>document.documentElement.style.display = 'none';</script>
    <script type="module" src="/src/gatekeeper.js"></script>
</head>
<body class="bg-[#f8fafc] text-slate-900 dark:text-slate-50 selection:bg-blue-100">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 backdrop-blur-md border-b border-slate-100 px-6">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20 group-hover:rotate-12 transition-transform text-white">
                    <span class="font-bold text-xl">E</span>
                </div>
                <span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-slate-50">EngiPrep <span class="text-blue-600 dark:text-blue-400">Hub</span></span>
            </a>
            
            <div id="nav-actions" class="flex items-center gap-4">
                <div class="skeleton w-32 h-10 opacity-20"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        <!-- Advanced Back Navigation -->
        <div class="mb-4 animate-fade-up">
            <a id="advanced-back-link" href="javascript:history.length > 1 ? history.back() : window.location.href='/dashboard.html'" class="inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 hover:text-blue-600 transition-all group dark:hover:text-blue-400">
                <span class="w-8 h-8 rounded-xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800/50 flex items-center justify-center shadow-xs group-hover:-translate-x-1 transition-transform">
                    <svg class="w-4 h-4 text-slate-500 group-hover:text-blue-600 transition-colors dark:text-slate-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                </span>
                Back
            </a>
        </div>

        <!-- Breadcrumbs -->
        <nav class="flex mb-8 animate-fade-up" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-2">
                <li class="inline-flex items-center">
                    <a href="/blogs.html" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition-all">Daily Blogs</a>
                <a href="/tasks.html" class="hidden md:block px-4 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all">Tasks</a>
                <a href="/dashboard.html" class="inline-flex items-center text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors dark:hover:text-blue-400">
                        <svg class="w-3 h-3 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Hub
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-3 h-3 text-slate-300 mx-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <a id="breadcrumb-semester-link" href="/semester-1.html" class="ml-1 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors md:ml-2 dark:hover:text-blue-400">Semester 1</a>
                    </div>
                </li>
                <li aria-current="page">
                    <div class="flex items-center">
                        <svg class="w-3 h-3 text-slate-300 mx-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span id="breadcrumb-subject" class="ml-1 text-[10px] font-black uppercase tracking-widest text-blue-600 md:ml-2 dark:text-blue-400">...</span>
                    </div>
                </li>
            </ol>
        </nav>

        <!-- Subject Header -->
        <header class="mb-12 animate-fade-up">
            <div id="subject-badge" class="inline-block px-4 py-1.5 rounded-full bg-blue-50 border border-blue-100 text-blue-600 text-[10px] font-bold uppercase tracking-widest mb-6 dark:text-blue-400">Subject Archive</div>
            <h1 id="subject-title" class="text-4xl md:text-5xl font-black text-slate-900 dark:text-slate-50 tracking-tight mb-4">...</h1>
            <p id="subject-desc" class="text-slate-500 max-w-2xl text-lg font-medium leading-relaxed dark:text-slate-400">Access well-structured notes, previous year questions, and rapid revision guides for this subject.</p>
        </header>

        <!-- Controls Layer -->
        <div class="flex flex-col lg:flex-row gap-6 mb-12 animate-fade-up" style="animation-delay: 0.1s">
            <div id="filter-tabs" class="flex flex-wrap items-center gap-2 p-1.5 bg-white dark:bg-slate-900 border border-slate-100 rounded-2xl shadow-sm h-fit">
                <button data-type="all" class="filter-btn px-6 py-2 rounded-xl bg-blue-600 text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all text-white">All Archive</button>
                <button data-type="notes" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 dark:bg-slate-950 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 dark:text-slate-50 transition-all">Full Notes</button>
                <button data-type="cheat-sheet" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 dark:bg-slate-950 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 dark:text-slate-50 transition-all">Cheat Sheets</button>
                <button data-type="PYQ" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 dark:bg-slate-950 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 dark:text-slate-50 transition-all">Exam PYQs</button>
                <button data-type="Revision" class="filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 dark:bg-slate-950 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 dark:text-slate-50 transition-all">Revision</button>
            </div>

            <!-- Exam Mode Toggle -->
            <button id="exam-mode-btn" class="flex items-center gap-4 px-8 py-3 rounded-2xl bg-amber-50 border border-amber-100 text-amber-600 group hover:bg-amber-100 transition-all ml-auto">
                <div class="w-10 h-10 bg-white dark:bg-slate-900 rounded-xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="text-left">
                    <div class="text-[10px] font-black uppercase tracking-widest leading-none">Exam Survival Mode</div>
                    <div class="text-[9px] text-amber-500/60 font-bold uppercase tracking-tight mt-1">Focus only on High Weightage</div>
                </div>
            </button>
        </div>

        <!-- Master Content Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Resource Grid -->
            <div id="notes-grid" class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-8 animate-fade-up" style="animation-delay: 0.2s">
                <!-- Loader Skeletons -->
                <div class="skeleton h-64 w-full rounded-3xl"></div>
                <div class="skeleton h-64 w-full rounded-3xl"></div>
                <div class="skeleton h-64 w-full rounded-3xl"></div>
                <div class="skeleton h-64 w-full rounded-3xl"></div>
            </div>

            <!-- Subject Intelligence Sidebar -->
            <aside class="space-y-8 animate-fade-up" style="animation-delay: 0.3s">
                <!-- Smart Recommendations -->
                <div class="bg-white dark:bg-slate-900 border border-slate-100 rounded-3xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Next Focus</h3>
                        <span class="px-2 py-0.5 bg-blue-50 text-blue-600 text-[8px] font-bold rounded uppercase dark:text-blue-400">Weightage based</span>
                    </div>
                    <div id="smart-predictions" class="space-y-4">
                        <div class="skeleton h-14 w-full opacity-50"></div>
                        <div class="skeleton h-14 w-full opacity-30"></div>
                    </div>
                </div>

                <!-- Analysis Sidebar -->
                <div class="bg-slate-900 rounded-3xl p-8 text-slate-900 dark:text-slate-50 relative overflow-hidden group">
                    <div class="absolute -right-16 -top-16 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl group-hover:scale-110 transition-transform"></div>
                    <div class="relative z-10">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Exam Analysis</h3>
                        <div id="pyq-analytics" class="space-y-6">
                             <div class="skeleton h-20 w-full bg-slate-200 dark:bg-slate-700 opacity-50"></div>
                        </div>
                    </div>
                </div>

                <!-- Fast Actions -->
                <div class="bg-white dark:bg-slate-900 border border-slate-100 rounded-3xl p-6 shadow-sm">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 font-bold">Academic Tools</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <a href="/tools.html" class="flex flex-col items-center justify-center p-4 bg-slate-50 dark:bg-slate-950 rounded-2xl hover:bg-slate-100 transition-all gap-2 group bg-slate-100 dark:bg-slate-800/50">
                            <span class="text-xl group-hover:scale-110 transition-transform">📊</span>
                            <span class="text-[9px] font-bold uppercase tracking-widest">Calculators</span>
                        </a>
                        <a href="/ai-professor.html" class="flex flex-col items-center justify-center p-4 bg-slate-50 dark:bg-slate-950 rounded-2xl hover:bg-slate-100 transition-all gap-2 group bg-slate-100 dark:bg-slate-800/50">
                            <span class="text-xl group-hover:scale-110 transition-transform">🤖</span>
                            <span class="text-[9px] font-bold uppercase tracking-widest">Ask AI</span>
                        </a>
                    </div>
                </div>

                <!-- Explore Others -->
                <div id="popular-subjects-container" class="bg-white dark:bg-slate-900 border border-slate-100 rounded-3xl p-6 shadow-sm hidden">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 font-bold">Related Branches</h3>
                    <div id="popular-subjects-list" class="space-y-4">
                        <!-- Injected -->
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script type="module">
        import { fetchNotesBySubject, fetchPYQAnalytics, fetchSubjectInsights, fetchPopularSubjects } from './src/notes.js'
        import { supabase } from './src/supabase.js'
        
        const params = new URLSearchParams(window.location.search)
        const subject = params.get('sub') || 'Mathematics I'
        const subjLower = subject.toLowerCase();
        if (subjLower.includes('physics') || subjLower.includes('ap102')) {
            window.location.replace('/physics-notes.html');
        } else if (subjLower.includes('data structure')) {
            window.location.replace('/data-structures-basics.html');
        } else if (subjLower.includes('chemistry')) {
            window.location.replace('/chemistry-topper-notes.html');
        } else if (subjLower.includes('mathematics i') || subjLower === 'm1') {
            window.location.replace('/maths-1.html');
        } else if (subjLower.includes('basic civil') || subjLower.includes('mechanical')) {
            // we don't have a specific custom overview page for basic civil, but we have units.
        }
        let currentNotes = []
        let currentFilter = 'all'
        let isExamMode = false

        document.getElementById('subject-title').innerText = subject
        document.getElementById('breadcrumb-subject').innerText = subject
        document.title = `${subject} JNTUK R23 Notes PDF, PYQs & Questions – EngiPrep Hub`

        async function loadContent() {
            try {
                const [notes, pyqs, insights] = await Promise.all([
                    fetchNotesBySubject(subject),
                    fetchPYQAnalytics(subject),
                    fetchSubjectInsights(subject)
                ])

                currentNotes = notes
                
                // Dynamic Breadcrumb & Back-link Semester Resolution
                if (currentNotes && currentNotes.length > 0) {
                    const semNum = currentNotes[0].semester || 1;
                    const semLink = document.getElementById('breadcrumb-semester-link');
                    if (semLink) {
                        semLink.innerText = `Semester ${semNum}`;
                        semLink.href = `/semester-${semNum}.html`;
                    }
                    const backLink = document.getElementById('advanced-back-link');
                    if (backLink && history.length <= 1) {
                        backLink.href = `/semester-${semNum}.html`;
                        backLink.innerHTML = `
                            <span class="w-8 h-8 rounded-xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800/50 flex items-center justify-center shadow-xs group-hover:-translate-x-1 transition-transform">
                                <svg class="w-4 h-4 text-slate-500 group-hover:text-blue-600 transition-colors dark:text-slate-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                                </svg>
                            </span>
                            Back to Semester ${semNum}
                        `;
                    }
                }

                renderGrid()
                renderAnalytics(pyqs)
                renderInsights(insights)
                loadRelatedSubjects()
            } catch (err) { console.error(err) }
        }

        async function loadRelatedSubjects() {
            try {
                const popular = await fetchPopularSubjects(4)
                const filtered = popular.filter(s => s !== subject)
                
                if (filtered.length > 0) {
                    document.getElementById('popular-subjects-container').classList.remove('hidden')
                    document.getElementById('popular-subjects-list').innerHTML = filtered.map(sub => `
                        <a href="/subject.html?sub=${encodeURIComponent(sub)}" class="flex items-center gap-3 group">
                            <div class="w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-950 flex items-center justify-center text-xs group-hover:bg-blue-50 transition-colors">📚</div>
                            <span class="text-[11px] font-bold text-slate-600 dark:text-slate-400 group-hover:text-blue-600 transition-colors truncate">${sub}</span>
                        </a>
                    `).join('')
                }
            } catch (err) { console.error(err) }
        }

        function renderInsights(insights) {
            const predContainer = document.getElementById('smart-predictions')
            if (!insights.expected || insights.expected.length === 0) {
                predContainer.innerHTML = '<p class="text-xs text-slate-400 italic">Exploring curriculum patterns...</p>'
            } else {
                predContainer.innerHTML = insights.expected.slice(0, 3).map(n => `
                    <a href="/note-viewer.html?slug=${n.slug}" class="block group">
                        <h4 class="text-xs font-bold text-slate-700 group-hover:text-blue-600 transition-colors truncate mb-1">${n.title}</h4>
                        <div class="flex items-center gap-2">
                            <span class="px-1.5 py-0.5 bg-slate-100 text-slate-400 text-[8px] font-bold uppercase rounded">${n.type}</span>
                            <span class="text-[8px] text-emerald-500 font-bold uppercase">${Math.round((n.weightage + n.frequency)/10 * 100)}% PRIORITY</span>
                        </div>
                    </a>
                `).join('')
            }
        }

        function renderAnalytics(pyqs) {
            const container = document.getElementById('pyq-analytics')
            if (pyqs.length === 0) {
                container.innerHTML = '<p class="text-xs text-slate-500 italic dark:text-slate-400">No historical data found yet.</p>'
                return
            }
            container.innerHTML = pyqs.slice(0, 3).map(q => `
                <div class="space-y-2 group">
                    <div class="flex justify-between items-end gap-2">
                        <span class="text-xs font-bold text-slate-200 truncate group-hover:text-blue-400 transition-colors">${q.title}</span>
                        <span class="text-[9px] font-black text-blue-400 uppercase shrink-0">${q.frequency}x Asked</span>
                    </div>
                    <div class="h-1 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)] transition-all duration-1000" style="width: ${Math.min(q.frequency * 20, 100)}%"></div>
                    </div>
                </div>
            `).join('')
        }

        function renderGrid() {
            const grid = document.getElementById('notes-grid')
            let filtered = currentFilter === 'all' ? currentNotes : currentNotes.filter(n => n.type === currentFilter)
            
            if (isExamMode) {
                filtered = currentNotes.filter(n => n.type === 'Revision' || n.weightage >= 4)
                filtered.sort((a,b) => b.weightage - a.weightage)
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-32 text-center bg-white dark:bg-slate-900 border border-slate-100 rounded-[2.5rem]"><span class="text-4xl mb-4 block">🔍</span><h3 class="text-xl font-bold mb-2">No resources found</h3><p class="text-slate-400 text-sm">We're still curating these specialized notes.</p></div>`
                return
            }

            grid.innerHTML = filtered.map(note => `
                <div class="bg-white dark:bg-slate-900 border border-slate-100 rounded-[2.5rem] p-4 group hover:shadow-xl hover:shadow-blue-500/5 hover:-translate-y-1 transition-all ${note.weightage >= 5 ? 'ring-2 ring-blue-500/20' : ''}">
                    <div class="aspect-[16/10] w-full bg-slate-50 dark:bg-slate-950 rounded-[1.75rem] mb-6 relative overflow-hidden border border-slate-100">
                        <div class="absolute inset-0 bg-gradient-to-t from-white/20 to-transparent"></div>
                        <div class="absolute bottom-4 left-4 flex gap-2">
                            <span class="px-3 py-1 backdrop-blur-md text-slate-900 dark:text-slate-50 text-[8px] font-bold uppercase rounded-lg shadow-sm">${note.type}</span>
                            ${note.weightage >= 5 ? '<span class="px-3 py-1 bg-rose-500 text-[8px] font-black uppercase rounded-lg shadow-sm text-white">High Priority</span>' : ''}
                        </div>
                    </div>
                    <div class="px-4 pb-4">
                        <h3 class="text-xl font-extrabold text-slate-900 dark:text-slate-50 mb-3 tracking-tight group-hover:text-blue-600 transition-colors line-clamp-1">${note.title}</h3>
                        <p class="text-slate-500 text-xs font-medium mb-8 line-clamp-2 leading-relaxed dark:text-slate-400">${note.content.replace(/<[^>]*>/g, '').substring(0, 100)}...</p>
                        <div class="flex items-center justify-between pt-6 border-t border-slate-50">
                            <a href="/note-viewer.html?slug=${note.slug}" class="text-[10px] font-black uppercase tracking-widest text-blue-600 dark:text-blue-400">Access Notes →</a>
                            <span class="text-[9px] text-slate-300 font-bold uppercase">5 Min Read</span>
                        </div>
                    </div>
                </div>
            `).join('')
        }

        // Exam Mode Toggle
        const examModeBtn = document.getElementById('exam-mode-btn')
        examModeBtn.addEventListener('click', function() {
            isExamMode = !isExamMode
            this.classList.toggle('bg-amber-50')
            this.classList.toggle('bg-amber-500')
            this.classList.toggle('text-amber-600')
            this.classList.toggle('text-slate-900 dark:text-slate-50')
            document.getElementById('filter-tabs').classList.toggle('opacity-30')
            document.getElementById('filter-tabs').classList.toggle('pointer-events-none')
            renderGrid()
        })

        // Filter Handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isExamMode) return
                document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn px-6 py-2 rounded-xl hover:bg-slate-50 dark:bg-slate-950 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 dark:text-slate-50 transition-all')
                btn.className = 'filter-btn px-6 py-2 rounded-xl bg-blue-600 text-white text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all'
                currentFilter = btn.dataset.type
                renderGrid()
            })
        })

        loadContent()
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
