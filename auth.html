                    <svg class="relative z-10 w-8 h-8 text-slate-900 dark:text-slate-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

            <h1 class="text-3xl font-black text-slate-900 dark:text-slate-50 tracking-tight" id="auth-title">Welcome Back</h1>
            <p class="text-slate-600 dark:text-slate-400 text-sm font-medium mt-2" id="auth-subtitle">Login to access your personalized dashboard.</p>
        </div>



        <form id="auth-form" class="space-y-6">
            <!-- Email Mode Fields -->
            <div id="email-mode-fields" class="space-y-6">
                <div id="signup-fields" class="hidden space-y-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Full Name</label>
                        <input type="text" id="full-name" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white dark:bg-slate-900 transition-all" placeholder="John Doe" minlength="3" maxlength="50" pattern="^[a-zA-Z\s]+$">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Unique Username</label>
                        <input type="text" id="username" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white dark:bg-slate-900 transition-all" placeholder="PhysicsNinja_23" minlength="3" maxlength="20">

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Email Address</label>
                    <input type="email" id="email" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white dark:bg-slate-900 transition-all" placeholder="student@jntuk.ac.in">
                </div>

                <div id="password-field">
                    <div class="flex justify-between items-center mb-2 px-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Password</label>
                        <button type="button" id="forgot-password" class="text-[9px] font-bold text-blue-600 hover:underline dark:text-blue-400">Forgot Password?</button>
                    </div>
                    <input type="password" id="password" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white dark:bg-slate-900 transition-all" placeholder="••••••••" minlength="8">
                </div>
            </div>



            <button type="submit" id="submit-btn" class="btn-primary w-full py-4 mt-4 shadow-blue-600/10">Login to Hub</button>

            <div id="auth-toggle-footer" class="text-center mt-8 pt-8 border-t border-slate-50">
                <p class="text-slate-500 text-sm font-medium dark:text-slate-400">
                    <span id="toggle-text-hint">Don't have an account?</span> 
                    <button type="button" id="toggle-auth" class="text-blue-600 font-bold hover:underline ml-1 dark:text-blue-400">Sign Up</button>
                </p>
                <div class="mt-4">
                    <a href="/index.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors dark:hover:text-blue-400">Continue as Guest (Preview)</a>

        <div id="error-message" class="mt-8 p-4 bg-rose-50 border border-rose-100 text-rose-600 text-xs font-bold rounded-2xl hidden text-center"></div>
    </div>

    <script type="module">
        import { signIn, signUp, resetPassword } from './src/auth.js'
        import { getCurrentUser, supabase } from './src/supabase.js'
        
        const form = document.getElementById('auth-form');
        const toggleBtn = document.getElementById('toggle-auth');
        const signupFields = document.getElementById('signup-fields');
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const errorDiv = document.getElementById('error-message');
        const toggleHint = document.getElementById('toggle-text-hint');
        const forgotPasswordBtn = document.getElementById('forgot-password');

        let isSignup = new URLSearchParams(window.location.search).get('signup') === 'true';

        // 0. Check for auth errors in URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error_description') || urlParams.get('error');
        if (error) {
            errorDiv.innerText = error.replace(/\+/g, ' ');
            errorDiv.classList.remove('hidden');
        }

        // 1. Initial immediate check
        async function checkSession() {
            const user = await getCurrentUser()
            if (user) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || '/index.html';
                window.location.replace(redirect);
            }
        }
        checkSession()

        // 2. Listen for session changes
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || '/index.html';
                window.location.replace(redirect);
            }
        })

        function updateUI() {
            if (isSignup) {
                signupFields.classList.remove('hidden');
                title.innerText = 'Join EngiPrep Hub';
                subtitle.innerText = 'Create your account to start tracking progress.';
                submitBtn.innerText = 'Create Account';
                toggleBtn.innerText = 'Login';
                toggleHint.textContent = 'Already have an account? ';
                forgotPasswordBtn.classList.add('invisible');
            } else {
                signupFields.classList.add('hidden');
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Login to access your study materials.';
                submitBtn.innerText = 'Login to Hub';
                toggleBtn.innerText = 'Sign Up';
                toggleHint.textContent = "Don't have an account? ";
                forgotPasswordBtn.classList.remove('invisible');
            }
        }

        toggleBtn.addEventListener('click', () => { isSignup = !isSignup; updateUI(); });

        forgotPasswordBtn.addEventListener('click', async () => {
            let email = document.getElementById('email').value.trim();
            
            if (!email) {
                email = window.prompt('Please enter your email address to receive a reset link:');
                if (!email) return;
                document.getElementById('email').value = email;
            }

            try {
                forgotPasswordBtn.disabled = true;
                const originalText = forgotPasswordBtn.innerText;
                forgotPasswordBtn.innerText = 'Sending...';
                await resetPassword(email);
                errorDiv.innerHTML = `<div class="font-bold mb-1">Recovery Sent!</div><div>Check your email for the reset link.</div>`;
                errorDiv.className = 'mt-8 p-4 bg-emerald-50 border border-emerald-100 text-emerald-600 text-xs font-bold rounded-2xl text-center';
                errorDiv.classList.remove('hidden');
            } catch (err) {
                errorDiv.innerText = getFriendlyError(err);
                errorDiv.className = 'mt-8 p-4 bg-rose-50 border border-rose-100 text-rose-600 text-xs font-bold rounded-2xl text-center';
                errorDiv.classList.remove('hidden');
            } finally {
                forgotPasswordBtn.disabled = false;
                forgotPasswordBtn.innerText = 'Forgot Password?';
            }
        });

        function getFriendlyError(err) {
            const message = err.message || '';
            if (message.includes('captcha protection')) return 'CAPTCHA_CONFIG';
            if (message.includes('Database error saving new user')) return 'DATABASE_TRIGGER_ERROR';
            if (message.includes('Invalid login credentials')) return 'Invalid email or password.';
            if (message.includes('Email not confirmed')) return 'Please verify your email first.';
            if (message.includes('User already registered')) return 'Account already exists.';
            if (message.includes('Rate limit exceeded')) return 'Too many attempts. Please wait.';
            return message || 'An unexpected error occurred.';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            submitBtn.disabled = true;
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'Processing...';

            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const fullName = document.getElementById('full-name').value.trim();
                const username = document.getElementById('username').value.trim();

                if (isSignup) {
                    const data = await signUp(email, password, fullName, username);
                    if (data?.user && !data?.session) {
                        errorDiv.innerHTML = `<div class="font-bold mb-1">✅ Account Created!</div><div>Please verify your email.</div>`;
                        errorDiv.classList.remove('hidden', 'bg-rose-50', 'text-rose-600');
                        errorDiv.classList.add('bg-emerald-50', 'text-emerald-600');
                    } else if (data?.session) { 
                        const urlParams = new URLSearchParams(window.location.search);
                        const redirect = urlParams.get('redirect') || '/index.html';
                        window.location.href = redirect; 
                    }
                } else {
                    await signIn(email, password);
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || '/index.html';
                    window.location.href = redirect;
                }
            } catch (err) {
                errorDiv.classList.remove('bg-emerald-50', 'text-emerald-600', 'bg-blue-50', 'text-blue-600');
                errorDiv.classList.add('bg-rose-50', 'text-rose-600');
                
                const friendly = getFriendlyError(err);
                if (friendly === 'CAPTCHA_CONFIG') {
                    errorDiv.innerHTML = `
                         <div class="space-y-4 text-left">
                            <p class="font-black text-[13px] uppercase tracking-tight text-rose-600">🛡️ Captcha Required</p>
                            <p class="font-medium text-[11px] leading-relaxed text-slate-600 dark:text-slate-400">Your Supabase project has Captcha protection enabled. You must disable it to log in from this environment.</p>
                            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                 <p class="text-[10px] font-bold text-blue-700 mb-1 uppercase text-left">How to fix:</p>
                                 <p class="text-[10px] text-blue-600 leading-normal text-left dark:text-blue-400">
                                    1. Open <strong>Supabase Dashboard</strong><br>
                                    2. Go to <strong>Auth</strong> > <strong>Configuration</strong> > <strong>Security and Protection</strong><br>
                                    3. Toggle OFF <strong>"Enable Captcha"</strong>
                                 </p>
                            </div>
                         </div>
                    `;

                } else if (friendly === 'DATABASE_TRIGGER_ERROR') {
                    errorDiv.innerHTML = `
                         <div class="space-y-4 text-left">
                            <p class="font-black text-[13px] uppercase tracking-tight text-rose-600">🗄️ Database Sync Error</p>
                            <p class="font-medium text-[11px] leading-relaxed text-slate-600 dark:text-slate-400">Your Auth signup worked, but saving the Profile failed. This usually means the "handle_new_user" trigger in your database is missing or misconfigured.</p>
                            
                            <div class="bg-indigo-900 p-4 rounded-2xl border relative group text-white border-slate-200 dark:border-slate-800">
                                <span class="text-[8px] font-black uppercase tracking-[0.2em] text-indigo-400 block mb-3">Copy to Supabase SQL Editor:</span>
                                <pre class="text-[9px] font-mono leading-relaxed overflow-x-auto whitespace-pre-wrap select-all">-- 1. Ensure Table and all required Columns exist
CREATE TABLE IF NOT EXISTS public.profiles (
  id uuid REFERENCES auth.users ON DELETE CASCADE PRIMARY KEY,
  email TEXT,
  username TEXT UNIQUE,
  full_name TEXT,
  avatar_url TEXT,
  branch TEXT,
  semester INT,
  college_year INT,
  bio TEXT,
  skills TEXT[],
  role TEXT DEFAULT 'user',
  xp INT DEFAULT 0,
  streak INT DEFAULT 0,
  trust_score INT DEFAULT 10,
  contributions_count INT DEFAULT 0,
  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
  updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
  CONSTRAINT username_length CHECK (char_length(username) >= 3)
);

-- Ensure columns exist if table was already created
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS email TEXT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS username TEXT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS full_name TEXT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS avatar_url TEXT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS branch TEXT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS semester INT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS college_year INT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS bio TEXT;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS skills TEXT[];
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS role TEXT DEFAULT 'user';
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS xp INT DEFAULT 0;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS streak INT DEFAULT 0;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS trust_score INT DEFAULT 10;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS contributions_count INT DEFAULT 0;
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW();
ALTER TABLE public.profiles ADD COLUMN IF NOT EXISTS updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW();

-- 2. Setup Automatic Sync with handle_new_user (Robust version)
CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS trigger AS $$
BEGIN
  INSERT INTO public.profiles (id, email, full_name, avatar_url)
  VALUES (
    new.id, 
    new.email,
    new.raw_user_meta_data->>'full_name', 
    new.raw_user_meta_data->>'avatar_url'
  )
  ON CONFLICT (id) DO UPDATE SET
    email = COALESCE(EXCLUDED.email, profiles.email),
    full_name = COALESCE(EXCLUDED.full_name, profiles.full_name),
    avatar_url = COALESCE(EXCLUDED.avatar_url, profiles.avatar_url);
  RETURN new;
END;
$$ LANGUAGE plpgsql SECURITY DEFINER;

-- 3. Bind Trigger
DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
CREATE TRIGGER on_auth_user_created
  AFTER INSERT ON auth.users
  FOR EACH ROW EXECUTE PROCEDURE public.handle_new_user();

-- 4. Enable RLS and Safety Policies
ALTER TABLE public.profiles ENABLE ROW LEVEL SECURITY;

DROP POLICY IF EXISTS "Profiles are publicly viewable" ON public.profiles;
CREATE POLICY "Profiles are publicly viewable" ON public.profiles
  FOR SELECT USING (true);

DROP POLICY IF EXISTS "Users can manage own profile" ON public.profiles;
CREATE POLICY "Users can manage own profile" ON public.profiles
  FOR ALL USING (auth.uid() = id);</pre>
                                <button type="button" onclick="navigator.clipboard.writeText(this.previousElementSibling.innerText); this.innerText='SQL COPIED'; setTimeout(()=>this.innerText='COPY SQL', 2000)" class="absolute right-4 top-4 text-[8px] font-black bg-indigo-500 px-3 py-1 rounded-full dark:bg-slate-900 hover:text-indigo-900 transition-all uppercase tracking-widest">COPY SQL</button>
                            </div>

                            <p class="text-[10px] text-slate-500 leading-normal dark:text-slate-400">Note: Since your table already exists, this script uses <code>IF NOT EXISTS</code> and <code>CREATE OR REPLACE</code> to fix the configuration without losing data.</p>
                         </div>
                    `;
                } else {
                    errorDiv.innerText = friendly;
                }
                
                errorDiv.classList.remove('hidden');
                submitBtn.innerText = originalBtnText;
            } finally {
                submitBtn.disabled = false;
            }
        });
        updateUI();
    </script>
    <script type="module" src="/src/ai-widget.ts"></script>
