<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up – EngiPrep Hub</title>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="selection:bg-blue-100 flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-surface border border-border rounded-[2.5rem] p-10 shadow-xl shadow-blue-500/5 animate-fade-up">
        <div class="text-center mb-10">
            <a href="/" class="inline-flex items-center gap-4 mb-8 group">
                <div class="relative w-14 h-14 flex items-center justify-center mx-auto">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl rotate-12 group-hover:rotate-0 transition-all duration-500 shadow-xl shadow-blue-500/20"></div>
                    <svg class="relative z-10 w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
            </a>
            <h1 class="text-3xl font-black text-text-main tracking-tight" id="auth-title">Welcome Back</h1>
            <p class="text-text-muted text-sm font-medium mt-2" id="auth-subtitle">Login to access your personalized dashboard.</p>
        </div>

        <form id="auth-form" class="space-y-6">
            <div id="signup-fields" class="hidden space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Full Name</label>
                    <input type="text" id="full-name" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white transition-all" placeholder="John Doe" minlength="3" maxlength="50" pattern="^[a-zA-Z\s]+$">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Unique Username</label>
                    <input type="text" id="username" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white transition-all" placeholder="PhysicsNinja_23" minlength="3" maxlength="20">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Email Address</label>
                <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white transition-all" placeholder="student@jntuk.ac.in">
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-2 block">Password</label>
                <input type="password" id="password" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:border-blue-300 focus:bg-white transition-all" placeholder="••••••••" minlength="8">
            </div>

            <button type="submit" id="submit-btn" class="btn-primary w-full py-4 mt-4 shadow-blue-600/10">Login to Hub</button>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-[9px] font-black uppercase tracking-widest"><span class="bg-surface px-4 text-text-muted">Or continue with</span></div>
            </div>

            <button type="button" id="google-btn" class="w-full py-4 border border-slate-100 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-50 transition-all">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="text-xs font-bold text-slate-700">Google Account</span>
            </button>

            <button type="button" id="linkedin-btn" class="w-full py-4 border border-slate-100 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-50 transition-all mt-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#0A66C2">
                    <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
                <span class="text-xs font-bold text-slate-700">LinkedIn Profile</span>
            </button>

            <div class="text-center mt-8 pt-8 border-t border-slate-50">
                <p class="text-slate-500 text-sm font-medium">
                    <span id="toggle-text-hint">Don't have an account?</span> 
                    <button type="button" id="toggle-auth" class="text-blue-600 font-bold hover:underline ml-1">Sign Up</button>
                </p>
                <div class="mt-4">
                    <a href="/semester-1.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors">Continue as Guest</a>
                </div>
            </div>
        </form>

        <div id="error-message" class="mt-8 p-4 bg-rose-50 border border-rose-100 text-rose-600 text-xs font-bold rounded-2xl hidden text-center"></div>
    </div>

    <script type="module" src="/src/config-check.js"></script>
    <script type="module">
        import { signIn, signUp, signInWithGoogle, signInWithLinkedIn } from './src/auth.js'
        import { getCurrentUser, supabase } from './src/supabase.js'
        
        const form = document.getElementById('auth-form'), googleBtn = document.getElementById('google-btn'), linkedinBtn = document.getElementById('linkedin-btn'), toggleBtn = document.getElementById('toggle-auth'), signupFields = document.getElementById('signup-fields'), title = document.getElementById('auth-title'), subtitle = document.getElementById('auth-subtitle'), submitBtn = document.getElementById('submit-btn'), errorDiv = document.getElementById('error-message'), toggleHint = document.getElementById('toggle-text-hint');
        
        let isSignup = new URLSearchParams(window.location.search).get('signup') === 'true';

        // 0. Check for auth errors in URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error_description') || urlParams.get('error');
        if (error) {
            let userMessage = error.replace(/\+/g, ' ');
            if (error === 'server_error') {
                const currentOrigin = window.location.origin;
                userMessage = `
                    <div class="space-y-4 text-left">
                        <div class="flex items-center gap-2 text-rose-600 mb-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                            <p class="font-black text-[13px] uppercase tracking-tight">Configuration Required</p>
                        </div>
                        <p class="font-medium text-[11px] leading-relaxed text-slate-600">Supabase rejected the login redirect. You must whitelist this URL in your Supabase Dashboard to enable Google Login.</p>
                        
                        <div class="space-y-3">
                            <div class="bg-black/5 p-4 rounded-2xl border border-black/5 group relative">
                                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 block mb-2">Redirect URI:</span>
                                <div class="flex items-center gap-2">
                                    <code id="copy-target" class="text-[10px] break-all font-mono text-blue-600 bg-white px-2 py-1.5 rounded border border-blue-100 flex-1 truncate">${currentOrigin}/dashboard.html</code>
                                    <button type="button" onclick="navigator.clipboard.writeText('${currentOrigin}/dashboard.html'); this.innerText='Saved!'; setTimeout(()=>this.innerText='Copy', 2000)" class="text-[9px] font-bold text-blue-600 underline shrink-0 hover:text-blue-800">Copy</button>
                                </div>
                            </div>
                        </div>

                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                             <p class="text-[10px] font-bold text-blue-700 mb-1 uppercase">How to fix:</p>
                             <p class="text-[10px] text-blue-600 leading-normal">1. Open <strong>Supabase Dashboard</strong><br>2. Go to <strong>Auth</strong> > <strong>URL Configuration</strong><br>3. Add the URI above to <strong>Redirect URIs</strong></p>
                        </div>

                        <div class="flex justify-between items-center pt-2">
                            <a href="/auth.html" class="text-[10px] font-bold text-slate-400 hover:text-slate-600 underline">Try again</a>
                            <a href="/semester-1.html" class="text-[10px] font-bold text-blue-600 hover:underline">Continue as Guest →</a>
                        </div>
                    </div>
                `;
                errorDiv.innerHTML = userMessage;
            } else {
                errorDiv.innerText = userMessage;
            }
            errorDiv.classList.remove('hidden');
        }

        // 1. Initial immediate check
        async function checkSession() {
            const user = await getCurrentUser()
            if (user) {
                window.location.replace('/dashboard.html')
            }
        }
        checkSession()

        // 2. Listen for session changes (needed for OAuth redirects)
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                window.location.replace('/dashboard.html')
            }
        })

        function updateUI() {
            if (isSignup) {
                signupFields.classList.remove('hidden');
                title.innerText = 'Join EngiPrep Hub';
                subtitle.innerText = 'Create your account to start tracking progress.';
                submitBtn.innerText = 'Create Account';
                toggleBtn.innerText = 'Login';
                toggleHint.textContent = 'Already have an account? ';
            } else {
                signupFields.classList.add('hidden');
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Login to access your study materials.';
                submitBtn.innerText = 'Login to Hub';
                toggleBtn.innerText = 'Sign Up';
                toggleHint.textContent = "Don't have an account? ";
            }
        }

        toggleBtn.addEventListener('click', () => { isSignup = !isSignup; updateUI(); });

        function getFriendlyError(err) {
            const message = err.message || '';
            const status = err.status;

            if (message.includes('Invalid login credentials')) {
                return 'Invalid email or password. Please check your credentials and try again.';
            }
            if (message.includes('Email not confirmed')) {
                return 'Your email has not been verified yet. Please check your inbox for the confirmation link.';
            }
            if (message.includes('User already registered')) {
                return 'An account with this email already exists. Try logging in instead.';
            }
            if (message.includes('Password should be at least')) {
                return 'Password is too weak. It must be at least 8 characters long.';
            }
            if (message.includes('Rate limit exceeded')) {
                return 'Too many attempts. Please wait a few minutes before trying again.';
            }
            
            // Generic fallback
            return message || 'An unexpected error occurred. Please try again later.';
        }

        googleBtn.addEventListener('click', async () => {
            errorDiv.classList.add('hidden');
            googleBtn.disabled = true;
            const originalContent = googleBtn.innerHTML;
            googleBtn.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-xs font-bold text-slate-700">Connecting to Google...</span>
                </div>
            `;
            try { 
                const { data } = await signInWithGoogle(); 
                if (data?.url) {
                    window.location.href = data.url;
                }
            } catch (err) {
                googleBtn.innerHTML = originalContent; 
                googleBtn.disabled = false;
                errorDiv.innerText = getFriendlyError(err); 
                errorDiv.classList.remove('hidden');
            }
        });

        linkedinBtn.addEventListener('click', async () => {
            errorDiv.classList.add('hidden');
            linkedinBtn.disabled = true;
            const originalContent = linkedinBtn.innerHTML;
            linkedinBtn.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-xs font-bold text-slate-700">Connecting to LinkedIn...</span>
                </div>
            `;
            try { 
                const { data } = await signInWithLinkedIn(); 
                if (data?.url) {
                    window.location.href = data.url;
                }
            } catch (err) {
                linkedinBtn.innerHTML = originalContent; 
                linkedinBtn.disabled = false;
                errorDiv.innerText = getFriendlyError(err); 
                errorDiv.classList.remove('hidden');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim(), password = document.getElementById('password').value, fullName = document.getElementById('full-name').value.trim(), username = document.getElementById('username').value.trim();
            
            errorDiv.classList.add('hidden', 'bg-emerald-50', 'text-emerald-600', 'bg-rose-50', 'text-rose-600');
            errorDiv.classList.add('bg-rose-50', 'text-rose-600'); // Reset to error state
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Processing...';

            try {
                if (isSignup) {
                    const data = await signUp(email, password, fullName, username);
                    if (data?.user && !data?.session) {
                        errorDiv.innerHTML = `<div class="font-bold mb-1">✅ Account Created!</div><div>Please check your email to verify your account before logging in.</div>`;
                        errorDiv.classList.remove('hidden', 'bg-rose-50', 'text-rose-600');
                        errorDiv.classList.add('bg-emerald-50', 'text-emerald-600');
                    } else if (data?.session) { window.location.href = '/dashboard.html'; }
                } else {
                    await signIn(email, password);
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                errorDiv.innerText = getFriendlyError(err); errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isSignup ? 'Create Account' : 'Login to Hub';
            }
        });
        updateUI();
    </script>
</body>
</html>
