<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post – EngiPrep Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .blog-body h1 { @apply text-4xl font-black mb-6 mt-12 text-white tracking-tighter; }
        .blog-body h2 { @apply text-3xl font-bold mb-4 mt-10 text-white tracking-tight; }
        .blog-body p { @apply text-gray-400 leading-[1.8] mb-8 text-lg; }
        .blog-body ul { @apply list-disc list-inside mb-8 space-y-3 text-gray-400; }
        .blog-body blockquote { @apply border-l-4 border-primary pl-6 py-2 italic bg-white/5 rounded-r-xl mb-8 text-gray-300; }
        .blog-body img { @apply rounded-3xl mb-8 border border-white/5 shadow-2xl; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-white selection:bg-primary/30">
    <!-- Navbar -->
    <nav class="border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/index.html" class="font-black text-xl tracking-tight uppercase">EngiPrep <span class="text-primary italic">Hub</span></a>
            <div class="flex items-center gap-6">
                <a href="/blog.html" class="text-[10px] uppercase font-black tracking-widest text-gray-500 hover:text-white">← Back to Blog</a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-24">
        <article class="animate-fade">
            <header class="mb-16">
                <div class="mb-6">
                    <span id="post-date" class="text-[10px] text-gray-600 font-black uppercase tracking-[0.2em]">...</span>
                </div>
                <h1 id="post-title" class="text-5xl md:text-6xl font-black tracking-tighter mb-8 leading-[1.1]">...</h1>
                <p id="post-excerpt" class="text-xl text-gray-500 italic mb-10 leading-relaxed">...</p>
                
                <div id="author-section" class="flex items-center gap-4 py-8 border-y border-white/5">
                    <div id="author-avatar-placeholder" class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center text-primary font-bold text-xl uppercase">?</div>
                    <img id="author-avatar" src="" class="w-12 h-12 rounded-full hidden object-cover border border-white/10 shadow-lg">
                    <div>
                        <div id="author-name" class="text-sm font-black uppercase tracking-widest text-white">...</div>
                        <div id="author-bio" class="text-[10px] text-gray-500 max-w-md mt-1 italic">...</div>
                    </div>
                </div>
            </header>

            <!-- AdSense Slot Above Content -->
            <div class="w-full h-32 bg-white/5 border border-white/5 rounded-2xl mb-16 flex items-center justify-center text-gray-600 text-xs font-black uppercase tracking-widest">
                Advertisement Slot
            </div>

            <div id="post-content" class="blog-body">
                <!-- Content Injected Here -->
            </div>

            <!-- AdSense Slot Below Content -->
            <div class="w-full h-32 bg-white/5 border border-white/5 rounded-2xl mt-16 flex items-center justify-center text-gray-600 text-xs font-black uppercase tracking-widest">
                Advertisement Slot
            </div>
        </article>
    </main>

    <footer class="bg-black/50 border-t border-white/5 py-20 px-6 mt-40">
        <div class="max-w-3xl mx-auto text-center">
            <h2 class="text-3xl font-black mb-6 italic">Ready to ace your exams?</h2>
            <p class="text-gray-500 mb-10">Join 5,000+ students already using EngiPrep Hub for their academic journey.</p>
            <a href="/auth.html" class="btn-primary py-4 px-12 rounded-2xl font-black uppercase tracking-widest text-sm">Join Now – Free Forever</a>
        </div>
    </footer>

    <script type="module">
        import { supabase } from './src/supabase.js'

        async function loadPost() {
            const params = new URLSearchParams(window.location.search)
            const slug = params.get('slug')

            if (!slug) return window.location.href = '/blog.html'

            const { data, error } = await supabase
                .from('blog_posts')
                .select(`
                    *,
                    profiles (
                        full_name,
                        bio,
                        avatar_url
                    )
                `)
                .eq('slug', slug)
                .single()

            if (error || !data) {
                document.getElementById('post-title').innerText = 'Post Not Found'
                return
            }

            document.title = `${data.title} – EngiPrep Blog`
            document.getElementById('post-title').innerText = data.title
            document.getElementById('post-excerpt').innerText = data.excerpt || ''
            document.getElementById('post-date').innerText = new Date(data.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
            document.getElementById('post-content').innerHTML = data.content

            // Update Author info
            const profile = data.profiles
            if (profile) {
                document.getElementById('author-name').innerText = profile.full_name || 'Anonymous Author'
                document.getElementById('author-bio').innerText = profile.bio || 'Technical Editor at EngiPrep Hub'
                
                if (profile.avatar_url) {
                    const img = document.getElementById('author-avatar')
                    img.src = profile.avatar_url
                    img.classList.remove('hidden')
                    document.getElementById('author-avatar-placeholder').classList.add('hidden')
                } else if (profile.full_name) {
                    document.getElementById('author-avatar-placeholder').innerText = profile.full_name.charAt(0)
                }
            }
        }

        loadPost()
    </script>
</body>
</html>
