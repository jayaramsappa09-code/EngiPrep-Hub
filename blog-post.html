<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post – EngiPrep Hub</title>
    <link rel="canonical" href="https://engiprephub.vercel.app/blog-post">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        @reference "./src/style.css";
        .blog-body h1 { @apply text-4xl font-black mb-6 mt-12 text-slate-900 dark:text-slate-50 tracking-tighter; }
        .blog-body h2 { @apply text-3xl font-bold mb-4 mt-10 text-slate-900 dark:text-slate-50 tracking-tight; }
        .blog-body p { @apply text-slate-500 dark:text-slate-400 leading-[1.8] mb-8 text-lg; }
        .blog-body ul { @apply list-disc list-inside mb-8 space-y-3 text-slate-500 dark:text-slate-400; }
        .blog-body blockquote { @apply border-l-4 border-primary pl-6 py-2 italic bg-slate-200 dark:bg-slate-700 rounded-r-xl mb-8 text-gray-300; }
        .blog-body img { @apply rounded-3xl mb-8 border border-white/5 shadow-2xl; }
    </style>

    <!-- Gatekeeper for Authentication -->
    <!-- Inline blocker removed for SEO/AdSense Crawlability -->
    <script type="module" src="/src/gatekeeper.js"></script>

    <meta property="og:title" content="Blog Post – EngiPrep Hub">
    <meta property="og:description" content="The ultimate JNTUK R23 engineering prep platform.">
    <meta property="og:url" content="https://engiprephub.vercel.app/blog-post">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="EngiPrep Hub">


    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>

</head>
<body class="bg-[#0a0a0f] text-slate-900 dark:text-slate-50 selection:bg-primary/30">
    <!-- Navbar -->
    <nav class="border-b bg-black/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 border-slate-200 dark:border-slate-800 border">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/index.html" class="font-black text-xl tracking-tight uppercase">EngiPrep <span class="text-primary italic">Hub</span></a>
            <div class="flex items-center gap-6">
                <a href="/blog.html" class="text-[10px] uppercase font-black tracking-widest text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:text-slate-50">← Back to Blog</a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-24">
        <article class="animate-fade">
            <header class="mb-16">
                <div class="mb-6 flex flex-wrap items-center gap-4">
                    <span id="post-category" class="text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border bg-primary/10 text-primary border-primary/20 hidden">General</span>
                    <span id="post-date" class="text-[10px] text-slate-500 dark:text-slate-400 font-semibold uppercase tracking-[0.2em]">...</span>
                </div>
                <h1 id="post-title" class="text-5xl md:text-6xl font-black tracking-tighter mb-8 leading-[1.1]">...</h1>
                <p id="post-excerpt" class="text-xl text-slate-500 dark:text-slate-400 italic mb-10 leading-relaxed">...</p>
                
                <div id="author-section" class="flex items-center gap-4 py-8 border-y border-slate-200 dark:border-slate-800 border">
                    <div id="author-initials-placeholder" class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center text-primary font-bold text-xl uppercase">?</div>
                    <div>
                        <div id="author-name" class="text-sm font-black uppercase tracking-widest text-slate-900 dark:text-slate-50">...</div>
                        <div id="author-bio" class="text-[10px] text-slate-500 dark:text-slate-400 max-w-md mt-1 italic">...</div>
                    </div>
                </div>
            </header>

            <!-- AdSense Slot Above Content -->
            <div class="w-full h-32 bg-slate-200 dark:bg-slate-700 border rounded-2xl mb-16 flex items-center justify-center text-slate-600 dark:text-slate-400 text-xs font-black uppercase tracking-widest border-slate-200 dark:border-slate-800">
                Advertisement Slot
            </div>

            <div id="post-content" class="blog-body">
                <!-- Content Injected Here -->
            </div>

            <!-- Comments Section -->
            <section class="mt-32 border-t pt-20 border-slate-200 dark:border-slate-800 border">
                <div class="flex items-center justify-between mb-12">
                    <h3 class="text-2xl font-black italic tracking-tight">Discussion <span id="comment-count" class="text-primary ml-2 text-sm not-italic opacity-50">(0)</span></h3>
                    <div id="auth-status-comment" class="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400">
                        <!-- Auth status logic -->
                    </div>
                </div>

                <!-- Comment Input -->
                <div id="comment-input-container" class="mb-16">
                    <div class="glass-card p-6 group focus-within:border-primary/40 transition-all bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border">
                        <textarea id="new-comment-text" class="w-full bg-transparent border-none focus:ring-0 text-gray-300 placeholder:text-slate-600 dark:text-slate-400 resize-none h-24" placeholder="Join the conversation... What are your thoughts?"></textarea>
                        <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-200 dark:border-slate-800 border">
                            <p class="text-[9px] text-slate-600 dark:text-slate-400 uppercase font-black tracking-widest italic group-focus-within:text-primary transition-colors">Be respectfull. Community rules apply.</p>
                            <button id="post-comment-btn" class="btn-primary py-2 px-6 text-[10px] uppercase font-black tracking-widest">Post Reply</button>
                        </div>
                    </div>
                    <p id="comment-error" class="text-rose-500 text-[10px] font-bold mt-4 hidden"></p>
                </div>

                <!-- Comments List -->
                <div id="comments-list" class="space-y-8">
                    <!-- Loading State -->
                    <div class="animate-pulse space-y-8">
                        <div class="h-20 bg-slate-200 dark:bg-slate-700 rounded-2xl"></div>
                        <div class="h-20 bg-slate-200 dark:bg-slate-700 rounded-2xl w-3/4 ml-auto"></div>
                        <div class="h-20 bg-slate-200 dark:bg-slate-700 rounded-2xl"></div>
                    </div>
                </div>
            </section>
        </article>
    </main>

    <footer class="bg-black/50 border-t py-20 px-6 mt-40 border-slate-200 dark:border-slate-800 border">
        <div class="max-w-3xl mx-auto text-center">
            <h2 class="text-3xl font-black mb-6 italic">Ready to ace your exams?</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-10">Join 5,000+ students already using EngiPrep Hub for their academic journey.</p>
            <a href="/auth.html" class="btn-primary py-4 px-12 rounded-2xl font-black uppercase tracking-widest text-sm">Join Now – Free Forever</a>
        </div>
    </footer>

    <script type="module">
        import { supabase } from './src/supabase.js'

        const fallbackPosts = [
            {
                id: 'c-programming-foundation-id',
                title: "Why C is the Foundation of your CSE Career",
                slug: "c-programming-foundation",
                category: "Programming",
                excerpt: "Understanding memory management and pointers is what separates a coder from a computer scientist.",
                content: "<h2>The power of pointer arithmetic</h2><p>Learning C programming allows you to understand how modern computer architectures allocate heap and stack memory, manage processing registers, and optimize compiler passes. Modern high-level languages like JavaScript or Python abstract these mechanisms, but a solid foundation in C ensures you remain unmatched as an engineering talent.</p>",
                created_at: new Date().toISOString()
            },
            {
                id: 'exam-stress-management-id',
                title: "How to handle JNTUK Exam Pressure",
                slug: "exam-stress-management",
                category: "Exam Prep",
                excerpt: "Stress management techniques for those dealing with back-to-back semester examinations.",
                content: "<h2>Optimize your study intervals</h2><p>Breathe. Semester exams under the JNTUK R23 regulations can feel daunting due to strict timelines. We advise practicing active recall on repeated 5-year PYQs. Spend 45 minutes studying, then rest for 15 minutes. This cognitive spacer technique is shown to boost memory retention by up to 40%.</p>",
                created_at: new Date().toISOString()
            },
            {
                id: 'maths-1-recurring-questions-id',
                title: "M1 recurring questions: A 5-year analysis",
                slug: "maths-1-recurring-questions",
                category: "Mathematics",
                excerpt: "We analyzed dozens of papers to find exactly which derivations appear every single year.",
                content: "<h2>The recurring syllabus nodes</h2><p>Historically, finding matrix ranks using the Echelon form, finding eigenvalues/eigenvectors, and applying the Cayley-Hamilton theorem are guaranteed 15-mark questions. Spend ample time solving linear systems and studying multivariable calculus extremas. Our math analysis PDF lists these specific derivations with direct answers.</p>",
                created_at: new Date().toISOString()
            },
            {
                id: 'physics-o-grade-secrets-id',
                title: "7 Secrets to Score O Grade in Engineering Physics",
                slug: "physics-o-grade-secrets",
                category: "Exam Prep",
                excerpt: "Most students struggle with the wave mechanics and quantum units. Here is the exact roadmap used by toppers to master JNTUK R23 Physics in just 7 days.",
                content: "<h2>Focus on Derivations and Delivers</h2><p>Step-by-step guidance to achieve an O Grade in Physics. Focus on Newtons Rings, Fraunhofer Diffraction of single/double slit, and the Schrödinger 1D box wave formulation. Mastery of these three derivations secures you a safe position to score outstanding grades in JNTUK assessments.</p>",
                created_at: new Date().toISOString()
            }
        ];

        let currentPostId = null;
        let currentUser = null;

        async function loadPost() {
            const params = new URLSearchParams(window.location.search)
            const slug = params.get('slug')

            if (!slug) return window.location.href = '/blog.html'

            let postData = null;
            let profileData = null;

            try {
                const { data, error } = await supabase
                    .from('blog_posts')
                    .select(`
                        *,
                        profiles (
                            full_name,
                            bio
                        )
                    `)
                    .eq('slug', slug)
                    .maybeSingle()

                if (!error && data) {
                    postData = data;
                    profileData = data.profiles;
                }
            } catch (err) {
                console.warn("Supabase load error, checking local fallback mapping:", err);
            }

            if (!postData) {
                postData = fallbackPosts.find(p => p.slug === slug);
            }

            if (!postData) {
                document.getElementById('post-title').innerText = 'Post Not Found'
                return
            }

            currentPostId = postData.id;
            document.title = `${postData.title} – EngiPrep Blog`
            document.getElementById('post-title').innerText = postData.title
            document.getElementById('post-excerpt').innerText = postData.excerpt || ''
            document.getElementById('post-date').innerText = new Date(postData.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
            document.getElementById('post-content').innerHTML = postData.content

            // Render category badge
            const catEl = document.getElementById('post-category');
            if (catEl) {
                const cat = postData.category || 'General';
                catEl.innerText = cat;
                catEl.classList.remove('hidden');

                const colors = {
                    'Programming': 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
                    'Mathematics': 'bg-blue-500/10 text-blue-400 border-blue-500/20',
                    'Exam Prep': 'bg-amber-500/10 text-amber-400 border-amber-500/20',
                    'General': 'bg-primary/10 text-primary border-primary/20'
                };

                catEl.className = `text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border ${colors[cat] || colors['General']}`;
            }

            // Update Author info
            if (profileData) {
                document.getElementById('author-name').innerText = profileData.full_name || 'Anonymous Author'
                document.getElementById('author-bio').innerText = profileData.bio || 'Technical Editor at EngiPrep'
                
                if (profileData.full_name) {
                    document.getElementById('author-initials-placeholder').innerText = profileData.full_name.charAt(0).toUpperCase()
                }
            } else {
                document.getElementById('author-name').innerText = 'Technical Editor'
                document.getElementById('author-bio').innerText = 'Senior Developer & Educator at EngiPrep Hub'
                document.getElementById('author-initials-placeholder').innerText = 'E'
            }

            loadComments();
        }

        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            currentUser = user;
            const authStatus = document.getElementById('auth-status-comment')
            const commentInput = document.getElementById('comment-input-container')

            if (user) {
                const { data: profile } = await supabase.from('profiles').select('username').eq('id', user.id).single()
                authStatus.innerHTML = `Posting as <span class="text-primary">@${profile?.username || 'User'}</span>`
            } else {
                authStatus.innerHTML = `<a href="/auth.html" class="text-primary hover:underline">Login</a> to comment`
                commentInput.innerHTML = `
                    <div class="glass-card p-12 text-center border-dashed bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 border">
                        <p class="text-slate-500 dark:text-slate-400 text-sm mb-6 italic">You must be logged in to participate in the discussion.</p>
                        <a href="/auth.html" class="btn-primary py-3 px-8 text-xs font-black uppercase tracking-widest inline-block">Login to Reply</a>
                    </div>
                `
            }
        }

        async function loadComments() {
            if (!currentPostId) return

            const { data, error } = await supabase
                .from('blog_comments')
                .select(`
                    *,
                    profiles (
                        username
                    )
                `)
                .eq('post_id', currentPostId)
                .order('created_at', { ascending: true })

            const list = document.getElementById('comments-list')
            const countLabel = document.getElementById('comment-count')

            if (error) {
                list.innerHTML = `<p class="text-slate-600 dark:text-slate-400 italic text-center py-10">Error loading comments.</p>`
                return
            }

            countLabel.innerText = `(${data.length})`

            if (data.length === 0) {
                list.innerHTML = `<p class="text-slate-600 dark:text-slate-400 italic text-center py-10">No comments yet. Be the first to break the silence!</p>`
                return
            }

            list.innerHTML = data.map(comment => `
                <div class="flex gap-5 animate-fade ${comment.status !== 'approved' ? 'opacity-75' : ''}">
                    <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 border flex-shrink-0 flex items-center justify-center text-xs font-black uppercase text-primary shadow-inner border-slate-200 dark:border-slate-800">
                        ${(comment.profiles?.username?.charAt(0) || '?').toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-3 mb-2">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-900 dark:text-slate-50">@${comment.profiles?.username || 'Anonymous'}</span>
                            <span class="text-[9px] text-slate-600 dark:text-slate-400 font-bold uppercase tracking-[0.1em]">posted on ${new Date(comment.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                            
                            ${comment.status === 'pending' ? `
                                <div class="flex items-center gap-2">
                                    <span class="text-[7.5px] bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded border border-amber-500/20 uppercase font-black tracking-widest flex items-center gap-1.5 shadow-sm">
                                        <span class="w-1 h-1 bg-amber-500 rounded-full animate-pulse"></span>
                                        Pending Review
                                    </span>
                                    <span class="text-[8px] text-amber-500/40 italic font-medium">(Only visible to you)</span>
                                </div>
                            ` : ''}
                            
                            ${comment.status === 'rejected' ? `
                                <span class="text-[7.5px] bg-rose-500/10 text-rose-500 px-2 py-0.5 rounded border border-rose-500/20 uppercase font-black tracking-widest">
                                    Rejected
                                </span>
                            ` : ''}
                        </div>
                        <div class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed rounded-2xl p-4 rounded-tl-none border group relative bg-white dark:bg-slate-900 shadow-sm border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            ${comment.content}
                            ${comment.admin_feedback ? `
                                <div class="mt-3 pt-3 border-t text-[10px] text-rose-400/80 italic flex items-start gap-2 border-slate-200 dark:border-slate-800 border">
                                    <span class="font-black uppercase text-[8px] tracking-widest text-rose-500 mt-0.5">Admin:</span>
                                    "${comment.admin_feedback}"
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('')
        }

        async function postComment() {
            const btn = document.getElementById('post-comment-btn')
            const text = document.getElementById('new-comment-text').value.trim()
            const errorEl = document.getElementById('comment-error')

            if (!text) return
            if (!currentUser) return window.location.href = '/auth.html'

            btn.disabled = true
            btn.innerText = 'Posting...'
            errorEl.classList.add('hidden')

            const { error } = await supabase
                .from('blog_comments')
                .insert({
                    post_id: currentPostId,
                    user_id: currentUser.id,
                    content: text
                })

            if (error) {
                errorEl.innerText = error.message
                errorEl.classList.remove('hidden')
                btn.disabled = false
                btn.innerText = 'Post Reply'
            } else {
                // Log activity
                await supabase.from('user_activity').insert({
                    user_id: currentUser.id,
                    action: 'post_comment',
                    metadata: { post_id: currentPostId }
                })

                document.getElementById('new-comment-text').value = ''
                btn.disabled = false
                btn.innerText = 'Post Reply'
                loadComments()
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.id === 'post-comment-btn') postComment()
        })

        loadPost()
        checkAuth()
    </script>
    <script type="module" src="/src/ai-widget.ts"></script>
</body>
</html>
