    <main class="max-w-2xl mx-auto px-6 py-20">
        <header class="mb-12 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-black italic">Notifications</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Personalized updates and platform news.</p>
            </div>
            <button id="mark-read-all" class="text-[10px] font-black uppercase tracking-widest text-primary border border-primary/20 px-4 py-2 rounded-xl hover:bg-primary hover:text-slate-900 dark:text-slate-50 transition-all">Mark all as read</button>
        </header>

        <div id="notifications-container" class="space-y-6">
            <div class="skeleton h-24 w-full"></div>
            <div class="skeleton h-24 w-full"></div>
            <div class="skeleton h-24 w-full"></div>
        </div>
    </main>

    <script type="module">
        import { getNotifications, markAsRead } from './src/utils/notifications.js'
        import { getCurrentUser } from './src/supabase.js'

        async function load() {
            const user = await getCurrentUser()
            if (!user) return window.location.href = '/auth.html'

            const list = await getNotifications()
            const container = document.getElementById('notifications-container')

            if (!list || list.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center border-2 border-dashed rounded-3xl border-slate-200 dark:border-slate-800 border">
                        <div class="flex justify-center mb-6">
                            <div class="w-16 h-16 bg-slate-200 dark:bg-slate-700 rounded-full flex items-center justify-center text-slate-700 dark:text-slate-300">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                            </div>
                        </div>
                        <p class="text-slate-500 dark:text-slate-400 italic">No notifications yet. Stay tuned!</p>
                    </div>
                `
                return
            }

            container.innerHTML = list.map(n => `
                <div class="glass-card p-8 border-l-4 ${n.is_read ? 'border-white/5 opacity-60' : 'border-primary shadow-[0_0_30px_rgba(var(--primary-rgb),0.1)]'} relative bg-white dark:bg-slate-900 shadow-sm">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold mb-2 ${n.is_read ? 'text-slate-500 dark:text-slate-400' : 'text-slate-900 dark:text-slate-50'}">${n.title}</h3>
                            <p class="text-slate-500 dark:text-slate-400 leading-relaxed">${n.message}</p>
                            <div class="mt-6 text-[10px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-400">${new Date(n.created_at).toLocaleDateString()}</div>
                        </div>
                        ${!n.is_read ? `
                            <button onclick="window.readNotification('${n.id}')" class="text-[10px] font-black uppercase tracking-widest text-primary hover:text-slate-900 dark:text-slate-50 transition-colors">Mark read</button>
                        ` : ''}
                    </div>
                </div>
            `).join('')
        }

        window.readNotification = async (id) => {
            await markAsRead(id)
            load()
        }

        document.getElementById('mark-read-all').addEventListener('click', async () => {
            const list = await getNotifications()
            const unread = list.filter(n => !n.is_read)
            for (const n of unread) {
                await markAsRead(n.id)
            }
            load()
        })

        load()
    </script>
