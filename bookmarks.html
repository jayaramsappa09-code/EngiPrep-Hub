<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmarks – EngiPrep Hub</title>
    <link rel="stylesheet" href="/src/style.css">

    <!-- Gatekeeper for Authentication -->
    <script>document.documentElement.style.display = 'none';</script>
    <script type="module" src="/src/gatekeeper.js"></script>
</head>
<body class="bg-[#0a0a0f]">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 border">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="/index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/30">
                    <span class="font-black text-xl">E</span>
                </div>
                <span class="text-xl font-black tracking-tighter uppercase">EngiPrep <span class="text-primary italic">Hub</span></span>
            </a>
            
            <div id="nav-actions" class="flex items-center gap-4">
                <div class="skeleton w-20 h-8 opacity-20"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-32 pb-20">
        <!-- Breadcrumbs -->
        <nav class="flex mb-8 animate-fade-up" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-2">
                <li class="inline-flex items-center">
                    <a href="/dashboard.html" class="inline-flex items-center text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-primary transition-colors">
                        <svg class="w-3 h-3 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Hub
                    </a>
                </li>
                <li aria-current="page">
                    <div class="flex items-center">
                        <svg class="w-3 h-3 text-slate-900 dark:text-slate-50/10 mx-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1 text-[10px] font-black uppercase tracking-widest text-primary md:ml-2">My Library</span>
                    </div>
                </li>
            </ol>
        </nav>

        <header class="mb-12">
            <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter">Your <span class="text-primary">Library</span></h1>
            <p class="text-slate-500 dark:text-slate-400">Quick access to the topics you've saved for revision.</p>
        </header>

        <div id="bookmarks-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading State -->
            <div class="animate-pulse bg-slate-200 dark:bg-slate-700 h-48 rounded-3xl"></div>
            <div class="animate-pulse bg-slate-200 dark:bg-slate-700 h-48 rounded-3xl"></div>
            <div class="animate-pulse bg-slate-200 dark:bg-slate-700 h-48 rounded-3xl"></div>
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-slate-200 dark:bg-slate-700 rounded-3xl border border-dashed border-slate-200 dark:border-slate-800">
            <div class="text-4xl mb-4">📚</div>
            <h3 class="text-xl font-bold mb-2">No bookmarks yet</h3>
            <p class="text-slate-500 dark:text-slate-400 mb-8">Save important topics to find them quickly later.</p>
            <a href="/semester-1.html" class="btn-primary">Explore Subjects</a>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/config-check.js"></script>
    <script type="module">
        import { supabase, requireAuth } from './src/supabase.js'
        import { getBookmarks, removeBookmark } from './src/notes.js'

        async function init() {
            const user = await requireAuth()
            if (!user) return

            loadBookmarks()
        }

        async function loadBookmarks() {
            const container = document.getElementById('bookmarks-container')
            const emptyState = document.getElementById('empty-state')
            
            try {
                const bookmarks = await getBookmarks()
                
                if (!bookmarks || bookmarks.length === 0) {
                    container.innerHTML = ''
                    emptyState.classList.remove('hidden')
                    return
                }

                emptyState.classList.add('hidden')
                container.innerHTML = bookmarks.map(bm => {
                    const note = bm.notes
                    if (!note) return ''; // Handle case where note might be missing
                    return `
                        <div class="glass-card p-6 flex flex-col justify-between group h-full bg-white dark:bg-slate-900 shadow-sm" id="bm-${bm.id}">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[10px] font-black uppercase tracking-widest text-primary px-2 py-0.5 bg-primary/10 rounded border border-primary/20">
                                        ${note.subject}
                                    </span>
                                    <button onclick="window.unbookmark('${bm.id}', '${note.id}')" class="text-slate-500 dark:text-slate-400 hover:text-red-500 transition-colors">
                                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
                                    </button>
                                </div>
                                <h3 class="text-xl font-bold mb-2 group-hover:text-primary transition-colors">${note.title}</h3>
                                <p class="text-slate-500 dark:text-slate-400 text-sm mb-6 line-clamp-2">${(note.content || '').replace(/<[^>]*>/g, '')}</p>
                            </div>
                            <a href="/note-viewer.html?slug=${note.slug}" class="btn-ghost text-xs py-2 w-full text-center">Open Note</a>
                        </div>
                    `
                }).join('')

                window.unbookmark = async (bookmarkId, noteId) => {
                    const success = await removeBookmark(noteId)
                    if (success) {
                        const el = document.getElementById(`bm-${bookmarkId}`)
                        el.style.opacity = '0'
                        el.style.transform = 'scale(0.9)'
                        setTimeout(() => {
                            el.remove()
                            if (container.children.length === 0) {
                                emptyState.classList.remove('hidden')
                            }
                        }, 300)
                    }
                }

            } catch (error) {
                console.error(error)
                container.innerHTML = '<p class="text-red-500">Failed to load bookmarks.</p>'
            }
        }

        init()
    </script>
</body>
</html>
